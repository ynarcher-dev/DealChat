<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전체 프로젝트 - DealChat</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Pretendard Font -->
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body class="theme-mode-projects">
    <!-- Global Loading Overlay -->
    <div id="global-loader">
        <div class="loader-logo">DealChat</div>
        <div class="loader-text"></div>
    </div>

    <!-- Transition Loader -->
    <div id="transition-loader">
        <div class="spinner"></div>
        <div class="loader-text"></div>
    </div>

    <div class="app-container">
        <main class="main-content dashboard-bg">
            <header id="global-header" class="top-bar"></header>

            <section class="page-content">

                <div class="text-center mb-4">
                    <h1 class="page-title">Projects</h1>
                    <p class="page-subtitle">내가 참여 중인 M&amp;A 딜 프로젝트를 관리하세요.</p>
                </div>

                <div class="search-and-actions">
                    <!-- Centered Search Bar -->
                    <div class="search-centered-wrap">
                        <div class="input-wrapper">
                            <input type="text" id="search-project" placeholder="프로젝트명 또는 키워드로 검색해주세요">
                            <button id="search-icon-btn">
                                <span class="material-symbols-outlined">search</span>
                            </button>
                        </div>
                    </div>

                    <!-- Right: Action Icons -->
                    <div class="actions-right">
                        <!-- 프로젝트 생성 기능 일시 중단
                        <button class="btn-icon-round" id="btn-add-project" title="프로젝트 생성">
                            <span class="material-symbols-outlined">add</span>
                        </button>
                        -->
                    </div>
                </div>

                <!-- Filter Panel -->
                <div id="filter-container" class="filter-panel">
                    <div class="row g-4">
                        <!-- 프로젝트 유형 Filter -->
                        <div class="col-md-6">
                            <div class="filter-group mb-2">
                                <label class="form-label fw-bold m-0 filter-group-label mb-2 d-block">프로젝트 유형</label>
                                <div class="d-flex flex-wrap gap-2">
                                    <div class="filter-item">
                                        <input type="radio" class="btn-check" name="filter-type-radio" id="filter-type-all" value="ALL" autocomplete="off" checked>
                                        <label class="industry-checkbox-label" for="filter-type-all">전체</label>
                                    </div>
                                    <div class="filter-item">
                                        <input type="radio" class="btn-check" name="filter-type-radio" id="filter-type-seller" value="SELLER" autocomplete="off">
                                        <label class="industry-checkbox-label" for="filter-type-seller">매도</label>
                                    </div>
                                    <div class="filter-item">
                                        <input type="radio" class="btn-check" name="filter-type-radio" id="filter-type-buyer" value="BUYER" autocomplete="off">
                                        <label class="industry-checkbox-label" for="filter-type-buyer">매수</label>
                                    </div>
                                </div>
                                <select id="filter-type" class="d-none">
                                    <option value="ALL">전체</option>
                                    <option value="SELLER">SELLER</option>
                                    <option value="BUYER">BUYER</option>
                                </select>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="filter-group mb-2">
                                <label class="form-label fw-bold m-0 filter-group-label mb-2 d-block">진행 상태</label>
                                <div class="d-flex flex-wrap gap-2">
                                    <div class="filter-item">
                                        <input type="radio" class="btn-check" name="filter-status-radio" id="filter-status-all" value="ALL" autocomplete="off" checked>
                                        <label class="industry-checkbox-label" for="filter-status-all">전체</label>
                                    </div>
                                    <div class="filter-item">
                                        <input type="radio" class="btn-check" name="filter-status-radio" id="filter-status-pending" value="PENDING" autocomplete="off">
                                        <label class="industry-checkbox-label" for="filter-status-pending">대기</label>
                                    </div>
                                    <div class="filter-item">
                                        <input type="radio" class="btn-check" name="filter-status-radio" id="filter-status-active" value="ACTIVE" autocomplete="off">
                                        <label class="industry-checkbox-label" for="filter-status-active">진행중</label>
                                    </div>
                                    <div class="filter-item">
                                        <input type="radio" class="btn-check" name="filter-status-radio" id="filter-status-completed" value="COMPLETED" autocomplete="off">
                                        <label class="industry-checkbox-label" for="filter-status-completed">완료</label>
                                    </div>
                                    <div class="filter-item">
                                        <input type="radio" class="btn-check" name="filter-status-radio" id="filter-status-stopped" value="STOPPED" autocomplete="off">
                                        <label class="industry-checkbox-label" for="filter-status-stopped">중단</label>
                                    </div>
                                </div>
                                <select id="filter-status" class="d-none">
                                    <option value="ALL">전체</option>
                                    <option value="PENDING">PENDING</option>
                                    <option value="ACTIVE">ACTIVE</option>
                                    <option value="COMPLETED">COMPLETED</option>
                                    <option value="STOPPED">STOPPED</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- List Header: Title & Sort -->
                <div class="d-flex justify-content-between align-items-end mb-3 px-1">
                    <div class="list-section-title">프로젝트 목록</div>
                    <div class="dropdown">
                        <button
                            class="btn btn-outline-secondary dropdown-toggle d-flex align-items-center justify-content-between p-2 sort-dropdown-btn"
                            type="button" id="sort-dropdown-btn" data-bs-toggle="dropdown" aria-expanded="false">
                            <div class="d-flex align-items-center gap-2">
                                <span class="material-symbols-outlined">sort</span>
                                <span id="current-sort-label">최근 수정순</span>
                            </div>
                            <span class="material-symbols-outlined">expand_more</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end border-0 shadow-lg p-2 mt-2"
                            aria-labelledby="sort-dropdown-btn"
                            style="border-radius: 12px; font-size: 13px; min-width: 180px;">
                            <li><a class="dropdown-item rounded-3 py-2 sort-option active" href="#" data-sort="updated_desc">최근 수정순</a></li>
                            <li><a class="dropdown-item rounded-3 py-2 sort-option" href="#" data-sort="created_desc">최근 생성순</a></li>
                            <li><a class="dropdown-item rounded-3 py-2 sort-option" href="#" data-sort="created_asc">오래된 생성순</a></li>
                            <li class="dropdown-divider my-1"></li>
                            <li><a class="dropdown-item rounded-3 py-2 sort-option" href="#" data-sort="name_asc">이름순 (ㄱ-ㅎ)</a></li>
                            <li><a class="dropdown-item rounded-3 py-2 sort-option" href="#" data-sort="name_desc">이름순 (ㅎ-ㄱ)</a></li>
                            <li class="dropdown-divider my-1"></li>
                            <li><a class="dropdown-item rounded-3 py-2 sort-option" href="#" data-sort="deadline_asc">목표일 임박순</a></li>
                        </ul>
                    </div>
                </div>

                <!-- Project Table -->
                <div id="project-list-wrap" class="list-table-wrap">
                    <div class="table-responsive">
                        <table class="table table-hover m-0" style="table-layout: fixed; vertical-align: middle;">
                            <thead>
                                <tr>
                                    <th class="list-th" style="width: 300px;">프로젝트명</th>
                                    <th class="list-th" style="width: 80px;">유형</th>
                                    <th class="list-th" style="width: 90px;">상태</th>
                                    <th class="list-th" style="width: 150px;">PM</th>
                                    <th class="list-th">팀원</th>
                                    <th class="list-th" style="width: 110px;">목표일</th>
                                    <th class="list-th" style="width: 110px;">신규 갱신일</th>
                                </tr>
                            </thead>
                            <tbody id="project-list-container">
                                <tr id="loading-spinner">
                                    <td colspan="7" class="text-center py-5">
                                        <div class="spinner-border text-primary" role="status">
                                            <span class="visually-hidden">Loading...</span>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Pagination -->
                <div id="pagination-container" class="d-flex justify-content-center mt-5" style="gap: 8px;"></div>

            </section>
            <footer id="global-footer"></footer>
        </main>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/front-config.js"></script>
    <script src="../js/header_loader.js"></script>
    <script src="../js/footer_loader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/modal_loader.js"></script>
    <script src="../js/total_projects.js" type="module"></script>

    <style>
        /* Status & Avatar Base Styles */
        .status-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600; white-space: nowrap; }
        .badge-pending { background-color: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; }
        .badge-active { background-color: #1a2a44; color: #ffffff; }
        .badge-completed { background-color: #ecfdf5; color: #059669; border: 1px solid #10b981; }
        .badge-stopped { background-color: #fef2f2; color: #ef4444; border: 1px solid #fecaca; }
        .entity-type-text {
            font-size: 13px;
            color: #334155;
            font-weight: 500;
            white-space: nowrap;
        }

        .avatar-group {
            display: flex;
            align-items: center;
        }
        .avatar-group .avatar {
            margin-left: -0.5rem;
            border: 2px solid #fff;
            border-radius: 50%;
            overflow: hidden;
            width: 26px;
            height: 26px;
            flex-shrink: 0;
        }
        .avatar-group .avatar:first-child { margin-left: 0; }
        .avatar-group .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-initial {
            width: 26px; height: 26px;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 600; border-radius: 50%;
        }

        body.theme-mode-projects {
            --page-theme-color: #1a2a44;
            --page-theme-hover: #121e33;
            --page-theme-light: #f1f5f9;
            --page-theme-border: #e2e8f0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif !important;
        }

        body, button, input, select, textarea {
            font-family: 'Pretendard', sans-serif !important;
        }

        .industry-checkbox-label {
            border: 1px solid #e2e8f0;
            background: #fff;
            color: #64748b;
            padding: 6px 16px;
            transition: all 0.2s ease;
            font-size: 13px;
            font-weight: 500;
        }
        .industry-checkbox-label:hover {
            border-color: #1a2a44 !important;
        }
        input.btn-check:checked + .industry-checkbox-label {
            background-color: #1a2a44 !important;
            border-color: #1a2a44 !important;
            color: #ffffff !important;
        }

        /* Project Editor Modal Styles */
        #projectEditorModal .modal-content { border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        #projectEditorModal .modal-header { padding: 32px 32px 16px; border-bottom: none; }
        #projectEditorModal .modal-title { font-size: 22px; font-weight: 700; color: #1e293b; }

        .premium-input-group {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            transition: all 0.2s ease;
            padding: 2px 8px;
        }
        .premium-input-group:focus-within {
            border-color: #1a2a44;
            box-shadow: 0 0 0 4px rgba(26, 42, 68, 0.05);
        }
        .premium-input-group .input-group-text { font-size: 20px; color: #94a3b8; border: none; background: transparent; }
        .premium-input-group .form-control { border: none; background: transparent; font-weight: 500; color: #1e293b; font-size: 15px; }
        .premium-input-group .form-control:focus { box-shadow: none; }
        .premium-input-group .form-control::placeholder { color: #cbd5e1; }

        .field-label {
            color: #64748b;
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 8px;
            display: block;
        }

        /* Member Tag */
        .member-tag {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 8px 16px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .member-tag.role-master { background: #1a2a44; border-color: #1a2a44; color: #ffffff; }
        .member-tag.role-master .badge { background: #ffffff !important; color: #1a2a44 !important; }
        .member-tag .remove-btn { color: #94a3b8; cursor: pointer; font-size: 16px !important; display: flex; align-items: center; }
        .member-tag .remove-btn:hover { color: #ef4444; }

        /* Integration Cards */
        .integration-card { background: #fff; border: 1px solid #e2e8f0 !important; border-radius: 16px !important; padding: 24px; }
        .text-seller { color: #7c3aed !important; }
        .text-buyer { color: #0d9488 !important; }
        .card-label { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }

        .btn-link-action {
            background: #fff;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            padding: 14px 10px;
            width: 100%;
            font-weight: 700;
            font-size: 13px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
        }
        .btn-link-action:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0,0,0,0.06); }
        .btn-link-seller { color: #7c3aed; border-color: #ddd6fe; background: #f5f3ff; }
        .btn-link-buyer { color: #0d9488; border-color: #ccfbf1; background: #f0fdfa; }

        .entity-mode-manual .form-control {
            background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px;
            font-size: 13px; padding: 12px 14px; color: #1e293b;
        }

        .divider-text {
            font-size: 11px; font-weight: 700; color: #94a3b8;
            border-bottom: 2px solid #f1f5f9; line-height: 0.1em;
                            margin: 40px 0 30px; text-align: center;
        }
        .divider-text span { background: #fff; padding: 0 15px; text-transform: uppercase; letter-spacing: 1px; }

        .btn-premium-primary { background: #1a2a44; color: #fff; border-radius: 12px; padding: 12px 32px; font-weight: 600; border: none; transition: all 0.2s; }
        .btn-status-chip.active { background: #ffffff; color: #1a2a44; border: 1px solid #1a2a44; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05); }
        .btn-status-chip.active[data-status="STOPPED"] { background: #ef4444 !important; color: #ffffff !important; border-color: #dc2626 !important; box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2); }
        .btn-premium-light { background: #f1f5f9; color: #475569; border-radius: 12px; padding: 12px 24px; font-weight: 600; border: none; }

        input[type="date"] { position: relative; color: #1e293b; }
        input[type="date"]::-webkit-calendar-picker-indicator {
            background: transparent; bottom: 0; color: transparent; cursor: pointer;
            height: auto; left: 0; position: absolute; right: 0; top: 0; width: auto;
        }

        .user-search-results {
            position: absolute; top: calc(100% + 5px); left: 0; right: 0; z-index: 2000;
            background: #fff; border: 1px solid #e2e8f0; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-height: 250px; overflow-y: auto;
        }
        .user-item { padding: 12px 16px; transition: all 0.2s; cursor: pointer; }
        .user-item:hover { background: #f8fafc; }
        .user-item:not(:last-child) { border-bottom: 1px solid #f1f5f9; }
    </style>


<script>
    // Sync radio buttons → hidden selects for JS compatibility
    document.querySelectorAll('input[name="filter-type-radio"]').forEach(radio => {
        radio.addEventListener('change', function () {
            document.getElementById('filter-type').value = this.value;
            document.getElementById('filter-type').dispatchEvent(new Event('change'));
        });
    });
    document.querySelectorAll('input[name="filter-status-radio"]').forEach(radio => {
        radio.addEventListener('change', function () {
            document.getElementById('filter-status').value = this.value;
            document.getElementById('filter-status').dispatchEvent(new Event('change'));
        });
    });
</script>

<!-- Project Editor Modal -->
<div class="modal fade" id="projectEditorModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" style="max-width: 500px;">
        <div class="modal-content border-0">
            <div class="modal-header border-0 d-flex justify-content-between align-items-center">
                <div>
                    <h4 class="modal-title fw-bold" id="projectModalTitle">새 프로젝트 생성</h4>
                    <p class="text-muted small mb-0 mt-1">프로젝트의 핵심 정보와 담당 멤버를 설정해주세요.</p>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4 pt-2">
                <form id="project-editor-form">
                    <!-- Project Name -->
                    <div class="mb-4">
                        <label class="field-label">프로젝트 명칭</label>
                        <div class="premium-input-group d-flex align-items-center">
                            <input type="text" id="project-name" class="form-control py-3" placeholder="예: [매칭] OOO 기업 인수 프로젝트" required />
                        </div>
                    </div>

                    <!-- Member Management -->
                    <div class="mb-4 position-relative">
                        <label class="field-label">참여 멤버 초대</label>
                        <div class="premium-input-group d-flex align-items-center">
                            <span class="input-group-text border-0 ps-2"><span class="material-symbols-outlined">person_add</span></span>
                            <input type="text" id="member-search-input" class="form-control" style="height: 48px;" placeholder="이름 또는 소속으로 검색..." />
                        </div>
                        <div id="member-search-results" class="user-search-results d-none"></div>
                        
                        <div id="selected-members-container" class="d-flex flex-wrap gap-2 mt-3">
                            <!-- Members will be added here -->
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="field-label">프로젝트 유형</label>
                        <div class="premium-input-group p-1">
                            <select id="entity-type" class="form-select border-0 bg-transparent px-3" style="height: 48px;">
                                <option value="SELLER">매도(Seller) 프로젝트</option>
                                <option value="BUYER">매수(Buyer) 프로젝트</option>
                            </select>
                        </div>
                    </div>
                    <div class="d-flex justify-content-end gap-2 mt-5">
                        <button type="button" class="btn btn-premium-light px-4" data-bs-dismiss="modal">취소</button>
                        <button type="submit" class="btn btn-premium-primary" id="btn-save-project">생성하기</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

    <script>
        // Filter Bridge: Radio buttons -> Hidden Select
        $(document).on('change', 'input[name="filter-status-radio"]', function() {
            $('#filter-status').val($(this).val()).trigger('change');
        });
        $(document).on('change', 'input[name="filter-type-radio"]', function() {
            $('#filter-type').val($(this).val()).trigger('change');
        });
    </script>
</body>

</html>
