<!DOCTYPE html>
<html>

<head>
</head>

<body>
  <script>
    try {
      var userData = JSON.parse(localStorage.getItem('dealchat_users'));
      if (userData && userData.isLoggedIn === true) {
        window.location.href = '/dashboard';
      } else {
        window.location.href = '/signin';
      }
    } catch (e) {
      window.location.href = '/signin';
    }
  </script>
</body>

</html>
