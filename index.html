<!DOCTYPE html>
<html>

<head>
  <script src="js/url_helper.js"></script>
</head>

<body>
  <script>
    try {
      var userData = JSON.parse(localStorage.getItem('dealchat_users'));
      if (userData && userData.isLoggedIn === true) {
        window.location.href = resolveUrl('/dashboard');
      } else {
        window.location.href = resolveUrl('/signin');
      }
    } catch (e) {
      window.location.href = resolveUrl('/signin');
    }
  </script>
</body>

</html>
