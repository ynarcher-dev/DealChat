<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - DealChat</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body>
    <div class="app-container">
        <main class="main-content dashboard-bg">
            <header class="top-bar">
                <div class="logo" style="cursor: pointer;" onclick="location.href='index.html'">
                    <img src="img/logo.png" style="height: 24px;">
                </div>
                <div class="user-profile">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="User Avatar" class="avatar">
                    <span class="user-name">홍길동</span>
                </div>
            </header>

            <section class="dashboard-content">
                <div class="welcome-header">
                    <h1>반갑습니다, 홍길동님</h1>
                    <p>탐색할 카테고리를 선택해주세요.</p>
                </div>

                <div class="card-grid">
                    <div class="menu-card" onclick="location.href='./html/companies.html'">
                        <div class="card-icon-wrapper company">
                            <span class="material-symbols-outlined">business</span>
                        </div>
                        <h3>Company</h3>
                        <p>기업 정보 및 데이터베이스 관리</p>
                        <div class="card-arrow">
                            <span class="material-symbols-outlined">arrow_forward</span>
                        </div>
                    </div>

                    <div class="menu-card" onclick="location.href='./html/files.html'">
                        <div class="card-icon-wrapper file">
                            <span class="material-symbols-outlined">description</span>
                        </div>
                        <h3>File</h3>
                        <p>문서 및 리소스 아카이브</p>
                        <div class="card-arrow">
                            <span class="material-symbols-outlined">arrow_forward</span>
                        </div>
                    </div>

                    <div class="menu-card" onclick="location.href='./html/sellers.html'">
                        <div class="card-icon-wrapper seller">
                            <span class="material-symbols-outlined">sell</span>
                        </div>
                        <h3>Seller</h3>
                        <p>매도자 정보 및 딜 파이프라인</p>
                        <div class="card-arrow">
                            <span class="material-symbols-outlined">arrow_forward</span>
                        </div>
                    </div>

                    <div class="menu-card" onclick="location.href='./html/buyers.html'">
                        <div class="card-icon-wrapper buyer">
                            <span class="material-symbols-outlined">shopping_cart</span>
                        </div>
                        <h3>Buyer</h3>
                        <p>매수자 정보 및 투자자 매칭</p>
                        <div class="card-arrow">
                            <span class="material-symbols-outlined">arrow_forward</span>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <style>
        .dashboard-bg {
            background: radial-gradient(circle at top right, rgba(66, 133, 244, 0.05), transparent),
                        radial-gradient(circle at bottom left, rgba(147, 51, 234, 0.05), transparent);
        }

        .dashboard-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .welcome-header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 0.8s ease-out;
        }

        .welcome-header h1 {
            font-size: 36px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 12px;
        }

        .welcome-header p {
            font-size: 18px;
            color: var(--text-secondary);
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            width: 100%;
            max-width: 900px;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        @media (max-width: 768px) {
            .card-grid {
                grid-template-columns: 1fr;
            }
        }

        .menu-card {
            background: white;
            border-radius: 24px;
            padding: 32px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
        }

        .menu-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
            border-color: var(--primary-color);
        }

        .card-icon-wrapper {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            transition: transform 0.3s ease;
        }

        .menu-card:hover .card-icon-wrapper {
            transform: scale(1.1);
        }

        .card-icon-wrapper .material-symbols-outlined {
            font-size: 32px;
            color: white;
        }

        .card-icon-wrapper.company { background: linear-gradient(135deg, #4285f4, #2b65c2); }
        .card-icon-wrapper.file { background: linear-gradient(135deg, #34a853, #25813d); }
        .card-icon-wrapper.seller { background: linear-gradient(135deg, #fbbc05, #d6a004); }
        .card-icon-wrapper.buyer { background: linear-gradient(135deg, #ea4335, #c52216); }

        .menu-card h3 {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .menu-card p {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .card-arrow {
            position: absolute;
            right: 32px;
            bottom: 32px;
            color: var(--border-color);
            transition: all 0.3s ease;
        }

        .menu-card:hover .card-arrow {
            color: var(--primary-color);
            transform: translateX(5px);
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</body>

</html>
