<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 로그인 - DealChat Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .admin-login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 28px;
            font-weight: 800;
            color: #1a1a1a;
            margin-bottom: 8px;
            display: inline-block;
        }

        .admin-badge {
            background: #333;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            vertical-align: middle;
            margin-left: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #696cff;
            box-shadow: 0 0 0 3px rgba(105, 108, 255, 0.1);
        }

        .btn-login {
            width: 100%;
            background: #696cff;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: #5f62e6;
        }

        .home-link {
            display: inline-block;
            margin-top: 20px;
            font-size: 13px;
            color: #888;
            text-decoration: none;
        }

        .home-link:hover {
            color: #555;
        }
    </style>
</head>

<body>
    <div class="admin-login-container">
        <div class="login-card">
            <div class="logo">:DEALCHAT <span class="admin-badge">ADMIN</span></div>
            <p class="subtitle">관리자 계정으로 로그인하세요.</p>

            <form id="admin-signin-form">
                <div class="form-group">
                    <label>이메일</label>
                    <input type="email" id="admin-email" placeholder="admin@dealchat.net" required>
                </div>

                <div class="form-group">
                    <label>비밀번호</label>
                    <input type="password" id="admin-password" placeholder="비밀번호" required>
                </div>

                <button type="submit" class="btn-login">로그인</button>
            </form>

            <a href="../../index.html" class="home-link">홈 메인으로 돌아가기</a>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../js/helpers.js"></script>
    <script src="../../js/front-config.js"></script>
    <script src="../js/admin_signin.js" type="module"></script>
</body>

</html>
