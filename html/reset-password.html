<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 재설정 - DealChat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Pretendard Font -->
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" integrity="sha384-uGEvnSEpW2nM9xJFsrxrwakwrk9QdDTQIBJh0hVMu90OaVyMAMpAK1rIn0/Kh1/k" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="auth-page">
    <main class="main-content">
        <div class="login-box">
            <h1 class="page-title">비밀번호 재설정</h1>
            <p class="page-subtitle">새로운 비밀번호를 입력해 주세요.</p>

            <form id="reset-password-form">
                <div class="form-group">
                    <label>새 비밀번호</label>
                    <input type="password" id="new-password" placeholder="새 비밀번호를 입력하세요" required minlength="6">
                </div>

                <div class="form-group" style="margin-top: 20px;">
                    <label>비밀번호 확인</label>
                    <input type="password" id="confirm-password" placeholder="한 번 더 입력하세요" required minlength="6">
                </div>

                <button type="submit" class="btn-login" id="btn-submit">비밀번호 변경하기</button>

                <div class="signup-section">
                    <button type="button" class="btn-signup-link" onclick="location.href='signin.html'">로그인으로 돌아가기</button>
                </div>
            </form>
        </div>
    </main>

    <footer id="global-footer"></footer>

    <!-- Global Loader Overlay -->
    <div id="global-loader" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 9999; justify-content: center; align-items: center; transition: opacity 0.3s ease;">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">로딩 중...</span>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.103.0" integrity="sha384-PsnFqJ58vyp7buRfuvdS2SrjRdUYinBv6lWwJXx3xQ17hWefo/UkwXowVBT53ubG" crossorigin="anonymous"></script>
    <script src="../js/helpers.js"></script>
    <script src="../js/front-config.js"></script>
    <script src="../js/footer_loader.js"></script>
    <script src="../js/reset-password.js" type="module"></script>
</body>

</html>
