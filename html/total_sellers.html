<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M&A Sellers - DealChat</title>
    <!-- Bootstrap CSS - Moved up to let style.css override it -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/url_helper.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Pretendard Font -->
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" integrity="sha384-uGEvnSEpW2nM9xJFsrxrwakwrk9QdDTQIBJh0hVMu90OaVyMAMpAK1rIn0/Kh1/k" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" integrity="sha384-+mbV2IY1Zk/X1p/nWllGySJSUN8uMs+gUAN10Or95UBH0fpj6GfKgPmgC5EXieXG" crossorigin="anonymous"></script>
</head>

<body class="theme-mode-sellers" data-share-entity="매도자 정보">
    <!-- Global Loading Overlay -->
    <div id="global-loader">
        <div class="loader-logo">DealChat</div>
        <div class="loader-text"></div>
    </div>
    <!-- Transition Loader for Detail View -->
    <div id="transition-loader" class="seller-theme">
        <div class="spinner"></div>
        <div class="loader-text"></div>
    </div>
    <div class="app-container">

        <main class="main-content dashboard-bg">
            <header id="global-header" class="top-bar"></header>

            <section class="page-content">

                <div class="text-center mb-4">
                    <h1 class="page-title">M&A Sellers</h1>
                    <p class="page-subtitle">전체 매도 의향 기업 및 자산 정보를 탐색하세요.</p>
                </div>

                <div class="search-and-actions">

                    <!-- Centered Search Bar -->
                    <div class="search-centered-wrap">
                        <div class="input-wrapper">
                            <input type="text" id="search-input" placeholder="매도자명, ID 또는 키워드로 검색해주세요">
                            <button id="search-icon-btn">
                                <span class="material-symbols-outlined">search</span>
                            </button>
                        </div>
                    </div>

                    <!-- Right: Action Icons -->
                    <div class="actions-right">


                        <!-- CSV Download Icon Button -->
                        <button id="export-csv-btn" class="btn-icon-round" title="CSV 다운로드">
                            <span class="material-symbols-outlined">download</span>
                        </button>
                    </div>
                </div>

                <!-- Collapsible Filter Container -->
                <div id="filter-container" class="filter-panel">
                    <!-- Industry Filter -->
                    <div class="filter-group mb-4">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <label class="form-label fw-bold m-0 filter-group-label">산업분야</label>
                            <button id="reset-filters" class="btn-filter-reset">선택 해제</button>
                        </div>
                        <div id="filter-industry-list" class="d-flex flex-wrap gap-2">
                            <!-- Industry checkboxes will be injected here -->
                        </div>
                    </div>

                    <!-- Row for Status and Visibility -->
                    <div class="row">
                        <!-- Progress Status Filter -->
                        <div class="col-md-4">
                            <div class="filter-group mb-4">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <label class="form-label fw-bold m-0 filter-group-label">진행 현황</label>
                                </div>
                                <div id="filter-method-list" class="d-flex flex-wrap gap-2">
                                    <div class="filter-item">
                                        <input type="checkbox" class="btn-check method-checkbox" id="filter-method-대기"
                                            value="대기" autocomplete="off">
                                        <label class="industry-checkbox-label" for="filter-method-대기">대기</label>
                                    </div>
                                    <div class="filter-item">
                                        <input type="checkbox" class="btn-check method-checkbox" id="filter-method-진행중"
                                            value="진행중" autocomplete="off">
                                        <label class="industry-checkbox-label" for="filter-method-진행중">진행중</label>
                                    </div>
                                    <div class="filter-item">
                                        <input type="checkbox" class="btn-check method-checkbox" id="filter-method-완료"
                                            value="완료" autocomplete="off">
                                        <label class="industry-checkbox-label" for="filter-method-완료">완료</label>
                                    </div>
                                </div>
                            </div>
                        </div>


                        <!-- NDA Status Filter -->
                        <div class="col-md-4">
                            <div class="filter-group mb-4">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <label class="form-label fw-bold m-0 filter-group-label">NDA 상태</label>
                                </div>
                                <div id="filter-visibility-list" class="d-flex flex-wrap gap-2">
                                    <div class="filter-item">
                                        <input type="checkbox" class="btn-check visibility-checkbox"
                                            id="filter-vis-public" value="public" autocomplete="off">
                                        <label class="industry-checkbox-label" for="filter-vis-public">NDA 완료</label>
                                    </div>
                                    <div class="filter-item">
                                        <input type="checkbox" class="btn-check visibility-checkbox"
                                            id="filter-vis-private" value="private" autocomplete="off">
                                        <label class="industry-checkbox-label" for="filter-vis-private">NDA 필요</label>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Price Range Filter (UI Only) -->
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold mb-2 filter-range-label">희망가 범위
                                (억)</label>
                            <div class="d-flex align-items-center gap-2">
                                <input type="number" id="filter-min-price" class="form-control filter-range-input" placeholder="최소">
                                <span class="text-muted">~</span>
                                <input type="number" id="filter-max-price" class="form-control filter-range-input" placeholder="최대">
                            </div>
                        </div>
                        <div class="col-md-6 d-flex align-items-end">
                            <div class="filter-item">
                                <input type="checkbox" class="btn-check negotiable-checkbox" id="filter-negotiable"
                                    value="협의" autocomplete="off">
                                <label class="industry-checkbox-label d-flex align-items-center gap-2"
                                    for="filter-negotiable" style="padding: 10px 20px;">
                                    <span class="material-symbols-outlined" style="font-size: 16px;">handshake</span>
                                    협의 포함
                                </label>
                            </div>
                        </div>
                    </div>

                </div>

                <!-- Table Header Section: Title & Sort -->
                <div class="d-flex justify-content-between align-items-end mb-3 px-1">
                    <div class="list-section-title">
                        매도자 목록
                    </div>
                    <div class="dropdown">
                        <button
                            class="btn btn-outline-secondary dropdown-toggle d-flex align-items-center justify-content-between p-2 sort-dropdown-btn"
                            type="button" id="sort-dropdown-btn" data-bs-toggle="dropdown" aria-expanded="false">
                            <div class="d-flex align-items-center gap-2">
                                <span class="material-symbols-outlined">sort</span>
                                <span id="current-sort-label">최근 등록순</span>
                            </div>
                            <span class="material-symbols-outlined">expand_more</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end border-0 shadow-lg p-2 mt-2"
                            aria-labelledby="sort-dropdown-btn"
                            style="border-radius: 12px; font-size: 13px; min-width: 180px;">
                            <li><a class="dropdown-item rounded-3 py-2 sort-option active" href="#" data-sort="latest">최근 등록순</a></li>
                            <li><a class="dropdown-item rounded-3 py-2 sort-option" href="#" data-sort="oldest">오래된 등록순</a></li>
                            <li class="dropdown-divider my-1"></li>
                            <li><a class="dropdown-item rounded-3 py-2 sort-option" href="#" data-sort="name_asc">이름순 (ㄱ-ㅎ)</a></li>
                            <li><a class="dropdown-item rounded-3 py-2 sort-option" href="#" data-sort="name_desc">이름순 (ㅎ-ㄱ)</a></li>
                            <li class="dropdown-divider my-1"></li>
                            <li><a class="dropdown-item rounded-3 py-2 sort-option" href="#" data-sort="price_desc">희망가 높은순</a></li>
                            <li><a class="dropdown-item rounded-3 py-2 sort-option" href="#" data-sort="price_asc">희망가 낮은순</a></li>
                        </ul>
                    </div>
                </div>

                <!-- Sellers Table Container -->
                <div id="seller-list-wrap" class="list-table-wrap">
                    <div class="table-responsive">
                        <table class="table table-hover m-0" style="table-layout: fixed; vertical-align: middle;">
                            <thead>
                                <tr>
                                    <th class="list-th" style="width: 240px;">매도자명</th>
                                    <th class="list-th" style="width: 140px;">산업</th>
                                    <th class="list-th" style="width: 90px;">희망가 (억)</th>
                                    <th class="list-th" style="width: 100px;">진행 현황</th>
                                    <th class="list-th" style="width: 300px;">소개 및 요약</th>
                                    <th class="list-th" style="width: 180px;">담당자</th>
                                    <th class="list-th" style="width: 110px;">등록일</th>
                                    <th class="list-th" style="width: 70px;">공유</th>
                                </tr>
                            </thead>
                            <tbody id="seller-list-container">
                                <!-- Table rows will be injected here -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Pagination -->
                <div id="pagination-container" class="d-flex justify-content-center mt-5" style="gap: 8px;">
                    <!-- Pagination buttons will be injected here -->
                </div>
            </section>
            <footer id="global-footer"></footer>
        </main>
    </div>


    <!-- Detail Seller Modal -->
    <div class="modal" id="seller-detail-modal" tabindex="-1" aria-labelledby="sellerDetailModalLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-half-screen">
            <div class="modal-content border-0 detail-modal-dialog">
                <div class="position-absolute top-0 end-0 pt-4 px-4" style="z-index: 10;">
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body p-0"
                    style="flex: 1; overflow-y: auto; display: flex; flex-direction: column;">
                    <!-- Header Section -->
                    <div class="pt-5 pb-4 px-5 text-center border-bottom bg-white" style="flex: 0 0 auto;">
                        <div class="detail-header-icon theme-sellers-bg mx-auto mb-3">
                            <span id="detail-seller-icon" class="material-symbols-outlined">storefront</span>
                        </div>
                        <h2 id="detail-seller-name" class="fw-bold mb-2 detail-header-name"></h2>
                        <div id="detail-industry-container" class="d-flex justify-content-center gap-2"></div>
                    </div>

                    <!-- Summary & Memo Section (Scrollable) -->
                    <div class="px-5 pt-4 pb-4"
                        style="flex: 1; overflow-y: auto;">
                        <!-- 상세 소개 -->
                        <div class="mb-4">
                            <div class="d-flex align-items-center gap-2 detail-section-header mb-3">
                                <div class="detail-section-icon theme-sellers-light-bg">
                                    <span class="material-symbols-outlined theme-sellers">description</span>
                                </div>
                                <span class="fw-bold detail-section-title">상세
                                    소개 및 요약</span>
                            </div>
                            <div id="detail-seller-summary" class="detail-section-body">
                            </div>
                        </div>

                        <!-- 담당자 메모 -->
                        <div class="mb-4">
                            <div class="d-flex align-items-center gap-2 detail-section-header mb-3">
                                <div class="detail-section-icon theme-sellers-light-bg">
                                    <span class="material-symbols-outlined theme-sellers">edit_note</span>
                                </div>
                                <span class="fw-bold detail-section-title">담당자 메모</span>
                            </div>
                            <div id="detail-seller-memo" class="detail-section-body">
                            </div>
                        </div>

                        <!-- 수정일자 표시 영역 -->
                        <div id="detail-modified-date-container" class="text-end mt-4">
                            <span id="detail-modified-date" style="font-size: 11px; color: #94a3b8;"></span>
                        </div>
                    </div>

                    <!-- Fixed Bottom Info: 매칭 희망가 + 진행 현황 -->
                    <div class="px-5 py-3 bg-white" style="flex: 0 0 auto;">
                        <div class="row g-0">
                            <div class="col-6 pe-3">
                                <div class="d-flex align-items-center gap-2 mb-2">
                                    <div class="d-flex align-items-center justify-content-center"
                                        style="width: 24px; height: 24px; background: #ede9fe; border-radius: 6px;">
                                        <span class="material-symbols-outlined"
                                            style="color: #8b5cf6; font-size: 14px;">payments</span>
                                    </div>
                                    <span class="fw-bold"
                                        style="letter-spacing: 0.5px; color: #64748b; font-size: 12px; text-transform: uppercase;">매칭
                                        희망가 (억)</span>
                                </div>
                                <div id="detail-seller-price"
                                    style="font-size: 15px; font-weight: 700; color: #8b5cf6; padding-left: 4px;">
                                </div>
                            </div>
                            <div class="col-6 ps-3" style="border-left: 1px solid #f1f5f9;">
                                <div class="d-flex align-items-center gap-2 mb-2">
                                    <div class="d-flex align-items-center justify-content-center"
                                        style="width: 24px; height: 24px; background: #ede9fe; border-radius: 6px;">
                                        <span class="material-symbols-outlined"
                                            style="color: #8b5cf6; font-size: 14px;">sync_alt</span>
                                    </div>
                                    <span class="fw-bold"
                                        style="letter-spacing: 0.5px; color: #64748b; font-size: 12px; text-transform: uppercase;">진행
                                        현황</span>
                                </div>
                                <div id="detail-seller-status"
                                    style="font-size: 15px; font-weight: 700; color: #475569; padding-left: 4px;">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Footer Section -->
                    <div class="px-5 py-4 border-top bg-white" style="flex: 0 0 auto;">
                        <div class="d-flex justify-content-between align-items-center">
                            <div id="detail-author-info-box" class="d-flex align-items-center gap-3"
                                style="min-width: 0; flex: 1; overflow: hidden; margin-right: 24px;">
                                <img id="detail-author-avatar" src="" alt="Avatar" class="rounded-circle"
                                    style="width: 44px; height: 44px; border: 1px solid #e2e8f0; flex-shrink: 0;">
                                <div class="d-flex flex-column justify-content-center" style="min-width: 0; overflow: hidden;">
                                    <div style="line-height: 1;">
                                        <span id="detail-author-name" class="fw-bold text-truncate"
                                            style="font-size: 14px; color: #1e293b; max-width: 100px; display: inline-block;"></span>
                                    </div>
                                    <div id="detail-author-affiliation-container" style="margin-top: 2px; line-height: 1;">
                                        <span id="detail-author-affiliation"
                                            class="badge bg-secondary-subtle text-secondary fw-normal text-truncate"
                                            style="font-size: 11px; max-width: 150px; display: inline-block; padding: 2px 6px;"></span>
                                    </div>
                                </div>
                            </div>
                            <div class="d-flex gap-2 flex-shrink-0">
                                <button type="button" class="btn btn-outline-secondary px-4 rounded-pill fw-bold modal-cancel-btn"
                                    data-bs-dismiss="modal">닫기</button>
                                <button type="button" id="btn-go-to-dealbook"
                                    class="btn btn-primary px-4 rounded-pill fw-bold modal-primary-btn">자세히
                                    보기</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.103.0" integrity="sha384-PsnFqJ58vyp7buRfuvdS2SrjRdUYinBv6lWwJXx3xQ17hWefo/UkwXowVBT53ubG" crossorigin="anonymous"></script>
    <script src="../js/front-config.js"></script>
    <script src="../js/header_loader.js"></script>
    <script src="../js/footer_loader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="../js/modal_loader.js"></script>
    <script src="../js/total_sellers.js?v=20260310_01" type="module"></script>

</body>

</html>
