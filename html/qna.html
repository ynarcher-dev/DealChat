<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상담문의 - DealChat</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --profile-bg: #ffffff;
            --profile-card-bg: #ffffff;
            --profile-accent: #1E293B;
            --profile-accent-soft: rgba(30, 41, 59, 0.1);
        }

        body {
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .qna-page-container {
            max-width: 800px;
            margin: 60px auto;
            width: 100%;
            padding: 0 20px;
            flex: 1;
        }

        .qna-content-card {
            background: var(--profile-card-bg);
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .content-header {
            padding: 40px 50px;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
        }

        .content-header h2 {
            margin: 0;
            font-size: 28px;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .content-header p {
            margin: 12px 0 0 0;
            color: var(--text-secondary);
            font-size: 15px;
        }

        .content-body {
            padding: 50px;
        }

        .form-group {
            margin-bottom: 28px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        .form-label .required {
            color: var(--profile-accent);
            margin-left: 3px;
        }

        .form-control {
            border-radius: 12px;
            padding: 14px 18px;
            border: 1px solid #e2e8f0;
            font-size: 15px;
            transition: all 0.2s ease;
            background-color: #ffffff;
        }

        .form-control:focus {
            border-color: var(--profile-accent);
            box-shadow: 0 0 0 4px var(--profile-accent-soft);
            outline: none;
        }

        .form-control::placeholder {
            color: #cbd5e1;
        }

        /* Inquiry Type Radio Styles */
        .inquiry-type-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .inquiry-type-item {
            flex: 1;
            min-width: 100px;
        }

        .inquiry-type-item input[type="radio"] {
            display: none;
        }

        .inquiry-type-item label {
            display: block;
            padding: 14px;
            text-align: center;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            transition: all 0.2s ease;
            background: #ffffff;
        }

        .inquiry-type-item input[type="radio"]:checked + label {
            border-color: var(--profile-accent);
            background-color: var(--profile-accent-soft);
            color: var(--profile-accent);
            box-shadow: 0 0 0 1px var(--profile-accent);
        }

        .btn-submit {
            background-color: var(--profile-accent);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.2s;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(30, 41, 59, 0.15);
        }

        .btn-submit:hover {
            background-color: #161D2B;
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(30, 41, 59, 0.2);
        }

        .btn-submit:active {
            transform: translateY(0);
        }



        textarea.form-control {
            resize: none;
        }
    </style>
</head>

<body>
    <header id="global-header" class="top-bar"></header>

    <div class="qna-page-container">
        <main class="qna-content-card">
            <div class="content-header">
                <h2>상담문의</h2>
                <p>문의 사항을 남겨주시면 담당자가 확인 후 신속하게 답변 드리겠습니다.</p>
            </div>

            <div class="content-body">
                <form id="qna-form">
                    <div class="form-group">
                        <label class="form-label">문의 유형 <span class="required">*</span></label>
                        <div class="inquiry-type-group">
                            <div class="inquiry-type-item">
                                <input type="radio" name="inquiryType" id="type-buyer" value="buyer" required>
                                <label for="type-buyer">인수자 문의</label>
                            </div>
                            <div class="inquiry-type-item">
                                <input type="radio" name="inquiryType" id="type-agent" value="agent">
                                <label for="type-agent">에이전트 문의</label>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label">이름 <span class="required">*</span></label>
                                <input type="text" name="name" id="qna-name" class="form-control" placeholder="성함을 입력하세요" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label">연락처 <span class="required">*</span></label>
                                <input type="text" name="contact" id="qna-contact" class="form-control" placeholder="연락 가능한 번호 입력" required>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label">이메일 <span class="required">*</span></label>
                                <input type="email" name="email" id="qna-email" class="form-control" placeholder="답변 받을 이메일 주소" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label">업체명 (소속)</label>
                                <input type="text" name="companyName" id="qna-company" class="form-control" placeholder="소속 회사나 단체명">
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">문의 제목 <span class="required">*</span></label>
                        <input type="text" name="subject" class="form-control" placeholder="문의하실 내용을 요약해주세요" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">문의 내용 <span class="required">*</span></label>
                        <textarea name="content" class="form-control" rows="6" placeholder="상세 내용을 입력해 주세요. (인수/매도 규모, 산업군 등)" required></textarea>
                    </div>

                    <button type="submit" class="btn-submit">문의 제출하기</button>
                </form>
            </div>
        </main>
    </div>

    <footer id="global-footer"></footer>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../js/header_loader.js"></script>
    <script src="../js/footer_loader.js"></script>
    <script src="../js/front-config.js"></script>
    <script src="../js/qna.js" type="module"></script>
</body>

</html>
