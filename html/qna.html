<!DOCTYPE html>
<html lang="ko-KR" class="layout-navbar-fixed layout-wide" dir="ltr" data-skin="default" data-assets-path="../"
    data-template="front-pages" data-bs-theme="light">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">

    <title>상담문의 | 딜챗</title>

    <link rel="icon" type="image/png" href="../img/favicon.png">

    <!-- Fonts -->
    <link rel="stylesheet" as="style" crossorigin="" href="../css/pretendard.min.css">
    <link rel="stylesheet" href="../css/iconify-icons.css">

    <!-- Core CSS -->
    <link rel="stylesheet" href="../css/core.css">
    <link rel="stylesheet" href="../css/demo.css">
    <link rel="stylesheet" href="../css/front-page.css">

    <style>
        .qna-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .qna-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .qna-header h2 {
            font-size: 28px;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }

        .qna-header p {
            color: #666;
            font-size: 16px;
        }

        .qna-form-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid #e5e7eb;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .form-label .required {
            color: #ff4d4f;
            margin-left: 2px;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d9d9d9;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s;
        }

        .form-control:focus {
            border-color: #696cff;
            outline: none;
            box-shadow: 0 0 0 2px rgba(105, 108, 255, 0.1);
        }

        .form-check-group {
            display: flex;
            gap: 20px;
            margin-top: 8px;
        }

        .form-check {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .btn-submit {
            width: 100%;
            background: #696cff;
            /* Primary color */
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-submit:hover {
            background: #5f62e6;
        }
    </style>

    <script src="../js/helpers.js"></script>
    <script src="../js/front-config.js"></script>
    <script type="module">
        import { APIcall } from '../js/APIcallFunction.js';
        window.APIcall = APIcall;
    </script>
</head>

<body>

    <!-- Navbar -->
    <nav class="layout-navbar shadow-none py-0">
        <div class="container">
            <div class="navbar navbar-expand-lg landing-navbar">
                <div class="navbar-brand app-brand demo d-flex py-0 me-4 me-xl-8">
                    <a href="../index.html" class="app-brand-link">
                        <span class="app-brand-logo demo">
                            <img src="../img/logo.png" style="height: 24px;">
                        </span>
                    </a>
                </div>

                <div class="collapse navbar-collapse landing-nav-menu" id="navbarSupportedContent">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link fw-semibold" href="./totalsellers.html">M&A거래</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link fw-semibold" href="./totalbuyers.html">투자자</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link fw-semibold" href="../startup/">스타트업정보</a>
                        </li>
                        <li class="nav-item active">
                            <a class="nav-link fw-semibold" href="./qna.html">상담문의</a>
                        </li>
                    </ul>
                </div>

                <ul class="navbar-nav flex-row align-items-center ms-auto d-none d-md-block d-lg-block me-4">
                    <li class="auth-guest-only">
                        <a href="./signin.html" class="btn btn-primary"><span
                                class="tf-icons icon-base bx bx-log-in-circle scaleX-n1-rtl me-md-1"></span><span>로그인</span></a>
                    </li>
                    <li class="auth-user-only" style="display: none;">
                        <a href="./index.html" class="btn btn-primary"><span
                                class="tf-icons icon-base bx bx-grid-alt scaleX-n1-rtl me-md-1"></span><span>대시보드</span></a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <!-- Navbar End -->

    <section class="section-py bg-body">
        <div class="container">
            <div class="qna-container">
                <div class="qna-header">
                    <h2>상담문의</h2>
                    <p>문의 사항을 남겨주시면, 기입하신 연락처로 회신드리겠습니다.</p>
                </div>

                <div class="qna-form-card">
                    <form id="qna-form">
                        <div class="form-group">
                            <label class="form-label">문의 유형 <span class="required">*</span></label>
                            <div class="form-check-group">
                                <label class="form-check">
                                    <input type="radio" name="inquiryType" value="seller"> 매도자
                                </label>
                                <label class="form-check">
                                    <input type="radio" name="inquiryType" value="buyer"> 인수자
                                </label>
                                <label class="form-check">
                                    <input type="radio" name="inquiryType" value="agent"> 에이전트
                                </label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">이름 <span class="required">*</span></label>
                            <input type="text" name="name" class="form-control" placeholder="문의자 이름을 입력하세요." required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">연락처 <span class="required">*</span></label>
                            <input type="text" name="contact" class="form-control" placeholder="문의 받으실 연락처를 입력하세요."
                                required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">이메일 <span class="required">*</span></label>
                            <input type="email" name="email" class="form-control" placeholder="문의 받으실 이메일을 입력하세요."
                                required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">업체명 <span class="required">*</span></label>
                            <input type="text" name="companyName" class="form-control" placeholder="문의자 소속을 입력하세요."
                                required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">문의 제목 <span class="required">*</span></label>
                            <input type="text" name="subject" class="form-control" placeholder="문의 제목을 입력하세요." required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">문의 내용 <span class="required">*</span></label>
                            <textarea name="content" class="form-control" rows="5" placeholder="문의 내용을 입력하세요."
                                required></textarea>
                        </div>

                        <button type="submit" class="btn-submit">제출하기</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/qna.js"></script>
    <script>
        // Check Auth for Navbar (Simplified version of index.html logic)
        document.addEventListener('DOMContentLoaded', function () {
            try {
                const userData = JSON.parse(localStorage.getItem('dealchat_users') || '{}');
                if (userData && userData.isLoggedIn) {
                    document.querySelectorAll('.auth-guest-only').forEach(el => el.style.display = 'none');
                    document.querySelectorAll('.auth-user-only').forEach(el => el.style.display = 'block');
                } else {
                    document.querySelectorAll('.auth-guest-only').forEach(el => el.style.display = 'block');
                    document.querySelectorAll('.auth-user-only').forEach(el => el.style.display = 'none');
                }
            } catch (e) {
                console.error('Auth check error:', e);
            }
        });
    </script>
</body>

</html>
