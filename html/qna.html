<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상담문의 - DealChat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/url_helper.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" integrity="sha384-uGEvnSEpW2nM9xJFsrxrwakwrk9QdDTQIBJh0hVMu90OaVyMAMpAK1rIn0/Kh1/k" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        /* ── QnA Layout ── */
        .qna-wrap {
            max-width: 760px;
            margin: 0 auto;
            width: 100%;
        }

        .qna-card {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: var(--dc-radius-large);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
            overflow: hidden;
        }

        .qna-card-header {
            padding: 28px 36px 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .qna-card-header h2 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            margin: 0 0 4px;
            font-family: 'Outfit', sans-serif;
        }

        .qna-card-header p {
            font-size: 13px;
            color: var(--text-secondary);
            margin: 0;
        }

        .qna-card-body {
            padding: 32px 36px;
        }

        /* ── Form Fields ── */
        .qna-form-group {
            margin-bottom: 20px;
        }

        .qna-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .qna-label .required {
            color: var(--dc-navy-deep);
            margin-left: 2px;
        }

        .qna-input {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid var(--border-color);
            border-radius: var(--dc-radius-base);
            font-size: 14px;
            color: var(--text-main);
            background: #ffffff;
            transition: border-color 0.15s, box-shadow 0.15s;
            font-family: inherit;
        }

        .qna-input:focus {
            border-color: var(--dc-navy-deep);
            box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.08);
            outline: none;
        }

        .qna-input::placeholder {
            color: #cbd5e1;
        }

        textarea.qna-input {
            resize: none;
        }

        /* ── Inquiry Type Radio ── */
        .inquiry-type-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .inquiry-type-item {
            flex: 1;
            min-width: 100px;
        }

        .inquiry-type-item input[type="radio"] {
            display: none;
        }

        .inquiry-type-item label {
            display: block;
            padding: 12px 14px;
            text-align: center;
            border: 1px solid var(--border-color);
            border-radius: var(--dc-radius-base);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            transition: border-color 0.15s, background 0.15s, color 0.15s;
            background: #ffffff;
            user-select: none;
        }

        .inquiry-type-item label:hover {
            background: #f8fafc;
            border-color: #94a3b8;
        }

        .inquiry-type-item input[type="radio"]:checked + label {
            border-color: var(--dc-navy-deep);
            background: rgba(15, 23, 42, 0.06);
            color: var(--dc-navy-deep);
            box-shadow: 0 0 0 1px var(--dc-navy-deep);
        }

        /* ── Submit Button ── */
        .btn-qna-submit {
            width: 100%;
            background: var(--dc-navy-deep);
            color: #ffffff;
            border: none;
            padding: 13px;
            border-radius: var(--dc-radius-base);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
            margin-top: 8px;
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.12);
            font-family: inherit;
        }

        .btn-qna-submit:hover {
            background: #1E293B;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.18);
        }

        .btn-qna-submit:active {
            transform: translateY(0);
        }
    </style>
</head>

<body>
    <div class="app-container">
        <main class="main-content dashboard-bg">
            <header id="global-header" class="top-bar"></header>

            <section class="page-content">
                <!-- 페이지 헤더 -->
                <div class="text-center mb-4">
                    <h1 class="page-title">상담문의</h1>
                    <p class="page-subtitle">궁금하신 점을 남겨주시면 담당자가 신속하게 답변드립니다.</p>
                </div>

                <div class="qna-wrap">
                    <div class="qna-card">
                        <div class="qna-card-header">
                            <h2>문의 양식</h2>
                            <p>모든 문의는 영업일 기준 1~2일 이내에 이메일로 답변드립니다.</p>
                        </div>
                        <div class="qna-card-body">
                            <form id="qna-form">
                                <!-- 문의 유형 -->
                                <div class="qna-form-group">
                                    <label class="qna-label">문의 유형 <span class="required">*</span></label>
                                    <div class="inquiry-type-group">
                                        <div class="inquiry-type-item">
                                            <input type="radio" name="inquiryType" id="type-buyer" value="buyer" required>
                                            <label for="type-buyer">인수자 문의</label>
                                        </div>
                                        <div class="inquiry-type-item">
                                            <input type="radio" name="inquiryType" id="type-agent" value="agent">
                                            <label for="type-agent">에이전트 문의</label>
                                        </div>
                                    </div>
                                </div>

                                <!-- 이름 / 연락처 -->
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="qna-form-group">
                                            <label class="qna-label" for="qna-name">이름 <span class="required">*</span></label>
                                            <input type="text" name="name" id="qna-name" class="qna-input" placeholder="성함을 입력하세요" required>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="qna-form-group">
                                            <label class="qna-label" for="qna-contact">연락처 <span class="required">*</span></label>
                                            <input type="text" name="contact" id="qna-contact" class="qna-input" placeholder="연락 가능한 번호 입력" required>
                                        </div>
                                    </div>
                                </div>

                                <!-- 이메일 / 업체명 -->
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="qna-form-group">
                                            <label class="qna-label" for="qna-email">이메일 <span class="required">*</span></label>
                                            <input type="email" name="email" id="qna-email" class="qna-input" placeholder="답변 받을 이메일 주소" required>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="qna-form-group">
                                            <label class="qna-label" for="qna-company">업체명 (소속)</label>
                                            <input type="text" name="companyName" id="qna-company" class="qna-input" placeholder="소속 회사나 단체명">
                                        </div>
                                    </div>
                                </div>

                                <!-- 문의 제목 -->
                                <div class="qna-form-group">
                                    <label class="qna-label" for="qna-subject">문의 제목 <span class="required">*</span></label>
                                    <input type="text" name="subject" id="qna-subject" class="qna-input" placeholder="문의하실 내용을 요약해주세요" required>
                                </div>

                                <!-- 문의 내용 -->
                                <div class="qna-form-group">
                                    <label class="qna-label" for="qna-content">문의 내용 <span class="required">*</span></label>
                                    <textarea name="content" id="qna-content" class="qna-input" rows="6" placeholder="상세 내용을 입력해 주세요. (인수/매도 규모, 산업군 등)" required></textarea>
                                </div>

                                <button type="submit" class="btn-qna-submit">문의 제출하기</button>
                            </form>
                        </div>
                    </div>
                </div>
            </section>

            <footer id="global-footer"></footer>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.103.0" integrity="sha384-PsnFqJ58vyp7buRfuvdS2SrjRdUYinBv6lWwJXx3xQ17hWefo/UkwXowVBT53ubG" crossorigin="anonymous"></script>
    <script src="../js/front-config.js"></script>
    <script src="../js/header_loader.js"></script>
    <script src="../js/footer_loader.js"></script>
    <script src="../js/qna.js" type="module"></script>
</body>

</html>
