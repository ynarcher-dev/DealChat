<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DealBook</title>
    <meta name="description" content="AI 기반 리서치 어시스턴트 NotebookLM 스타일의 웹 페이지 인터페이스입니다.">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-header-top">
                    <div class="logo" style="cursor: pointer;" onclick="location.href='../index.html'">
                        <img src="../img/logo.png" style="height: 24px;">
                    </div>
                    <button class="btn-toggle-sidebar" id="toggle-sidebar">
                        <span class="material-symbols-outlined">menu_open</span>
                    </button>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <p style="margin: 0; font-weight: 600;">회사소개</p>
                    <div style="display: flex; gap: 4px;">
                        <button id="expand-summary" class="btn-secondary"
                            style="padding: 4px 4px; font-size: 12px; display: flex; align-items: center; justify-content: center; min-width: 28px;">
                            <span class="material-symbols-outlined" style="font-size: 16px;">open_in_full</span>
                        </button>
                    </div>
                </div>
                <textarea id="summary"
                    style="width: 100%; min-height: 150px; padding: 10px; border: 1px solid var(--border-color); border-radius: 8px; font-family: inherit; font-size: 14px; line-height: 1.6; resize: vertical;"
                    placeholder="업로드된 소스에 대해 질문해보세요..." rows="10" readonly></textarea>

            </div>

            <nav class="sidebar-nav">

            </nav>

            <div class="sidebar-footer">
                <div class="user-profile">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="User Avatar" class="avatar">
                    <span class="user-name">홍길동</span>
                </div>
                <button class="btn-icon-only">
                    <span class="material-symbols-outlined">settings</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="breadcrumb">
                    <span class="folder">My DealChat</span>
                    <span class="separator">/</span>
                    <span class="notebook-title" contenteditable="true">와이앤아처</span>
                </div>
                <div class="top-actions">
                    <button class="btn-secondary">
                        <span class="material-symbols-outlined">share</span>
                        매물등록
                    </button>
                    <button class="btn-primary">
                        Data Sources
                    </button>
                </div>
            </header>

            <section class="chat-area" id="chat-messages">
                <div class="welcome-screen">
                    <h1 class="welcome-title">무엇을 도와드릴까요?</h1>
                    <p class="welcome-subtitle">업로드한 소스를 바탕으로 질문에 답하거나 요약해 드립니다.</p>
                    <div class="suggested-prompts">
                        <button class="prompt-chip">이 문서들의 핵심 내용을 요약해줘</button>
                        <button class="prompt-chip">시장 기회 요인을 분석해줘</button>
                        <button class="prompt-chip">리스크 요인이 뭐야?</button>
                    </div>
                </div>

                <!-- Messages will be injected here -->
            </section>

            <footer class="input-area">
                <div class="input-wrapper">
                    <div class="input-tools-left">
                        <button class="btn-icon">
                            <span class="material-symbols-outlined">attach_file</span>
                        </button>
                    </div>
                    <textarea id="chat-input" placeholder="업로드된 소스에 대해 질문해보세요..." rows="1"></textarea>
                    <div class="input-tools-right">
                        <button class="btn-send" id="send-btn">
                            <span class="material-symbols-outlined">send</span>
                        </button>
                    </div>
                </div>
                <p class="input-disclaimer">NotebookLM은 실수를 할 수 있습니다. 중요한 정보는 소스에서 직접 확인하세요.</p>
            </footer>
        </main>

        <!-- Right Panel (Notebook Guide) -->
        <aside class="right-panel hidden" id="guide-panel">
            <div class="panel-header">
                <h2>Data Sources</h2>
                <button class="btn-close" id="close-guide">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="panel-content">
                <div class="guide-section">
                    <button class="btn-new-source" id="add-source">
                        <span class="material-symbols-outlined">add</span>
                        <span>소스 추가</span>
                    </button>
                    <input type="file" id="file-upload" multiple style="display: none;" accept=".pdf,.doc,.docx,.txt">
                </div>
                <div class="nav-section">
                    <ul class="source-list" id="source-list">
                        <!-- Uploaded files will appear here -->
                    </ul>
                </div>
            </div>
        </aside>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../js/dealbook.js"></script>

    <!-- Summary Expand Modal -->
    <div id="summary-modal" class="modal-overlay">
        <div class="modal-content-large">
            <div class="modal-header">
                <h3>회사소개</h3>
                <div style="display: flex; gap: 8px; align-items: center;">
                    <button id="ai-generate" class="btn-secondary"
                        style="padding: 6px 12px; font-size: 14px; display: flex; align-items: center; gap: 6px;">
                        <span class="material-symbols-outlined" style="font-size: 18px;">auto_awesome</span>
                        AI로 생성하기
                    </button>
                    <button class="btn-close" id="close-summary-modal">
                        <span class="material-symbols-outlined">close</span>
                    </button>
                </div>
            </div>
            <div class="modal-body">
                <textarea id="modal-summary-text" placeholder="회사소개 내용을 입력하세요..."></textarea>
            </div>
            <div class="modal-footer">
                <button id="save-summary" class="btn-primary">저장</button>
            </div>
        </div>
    </div>
</body>

</html>
