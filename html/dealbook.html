<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DealBook</title>
    <meta name="description" content="AI 기반 리서치 어시스턴트 NotebookLM 스타일의 웹 페이지 인터페이스입니다.">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-header-top">
                    <div class="logo" style="cursor: pointer;" onclick="location.href='../index.html'">
                        <img src="../img/logo.png" style="height: 24px;">
                    </div>
                    <button class="btn-toggle-sidebar" id="toggle-sidebar">
                        <span class="material-symbols-outlined">menu_open</span>
                    </button>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <p style="margin: 0; font-weight: 600;">회사소개</p>
                    <div style="display: flex; gap: 4px;">
                        <button id="expand-summary" class="btn-secondary"
                            style="padding: 4px 4px; font-size: 12px; display: flex; align-items: center; justify-content: center; min-width: 28px;">
                            <span class="material-symbols-outlined" style="font-size: 16px;">open_in_full</span>
                        </button>
                    </div>
                </div>
                <textarea id="summary"
                    style="width: 100%; min-height: 150px; padding: 10px; border: 1px solid var(--border-color); border-radius: 8px; font-family: inherit; font-size: 14px; line-height: 1.6; resize: vertical;"
                    placeholder="업로드된 소스에 대해 질문해보세요..." rows="10" readonly></textarea>

            </div>

            <nav class="sidebar-nav">

            </nav>

            <div class="sidebar-footer">
                <div class="user-profile">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="User Avatar" class="avatar">
                    <span class="user-name">홍길동</span>
                </div>
                <button class="btn-icon-only">
                    <span class="material-symbols-outlined">settings</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="breadcrumb">
                    <span class="folder">My DealChat</span>
                    <span class="separator">/</span>
                    <span class="notebook-title" contenteditable="true">와이앤아처</span>
                </div>
                <div class="top-actions">
                    <button class="btn-secondary" id="btn-register-deal">
                        <span class="material-symbols-outlined">share</span>
                        매물등록상태
                    </button>
                    <button class="btn-primary">
                        Data Sources
                    </button>
                </div>
            </header>

            <section class="chat-area" id="chat-messages">
                <div class="welcome-screen">
                    <h1 class="welcome-title">무엇을 도와드릴까요?</h1>
                    <p class="welcome-subtitle">업로드한 소스를 바탕으로 질문에 답하거나 요약해 드립니다.</p>
                    <div class="suggested-prompts">
                        <button class="prompt-chip">이 문서들의 핵심 내용을 요약해줘</button>
                        <button class="prompt-chip">시장 기회 요인을 분석해줘</button>
                        <button class="prompt-chip">리스크 요인이 뭐야?</button>
                    </div>
                </div>

                <!-- Messages will be injected here -->
            </section>

            <footer class="input-area">
                <div class="input-wrapper">
                    <div class="input-tools-left">
                        <button class="btn-icon">
                            <span class="material-symbols-outlined">attach_file</span>
                        </button>
                    </div>
                    <textarea id="chat-input" placeholder="업로드된 소스에 대해 질문해보세요..." rows="1"></textarea>
                    <div class="input-tools-right">
                        <button class="btn-send" id="send-btn">
                            <span class="material-symbols-outlined">send</span>
                        </button>
                    </div>
                </div>
                <p class="input-disclaimer">NotebookLM은 실수를 할 수 있습니다. 중요한 정보는 소스에서 직접 확인하세요.</p>
            </footer>
        </main>

        <!-- Right Panel (Notebook Guide) -->
        <aside class="right-panel hidden" id="guide-panel">
            <div class="panel-header">
                <h2>Data Sources</h2>
                <button class="btn-close" id="close-guide">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="panel-content">
                <div class="guide-section">
                    <button class="btn-new-source" id="add-source">
                        <span class="material-symbols-outlined">add</span>
                        <span>소스 추가</span>
                    </button>
                    <input type="file" id="file-upload" multiple style="display: none;" accept=".pdf,.doc,.docx,.txt">
                </div>
                <div class="nav-section">
                    <ul class="source-list" id="source-list">
                        <!-- Uploaded files will appear here -->
                    </ul>
                </div>
            </div>
        </aside>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../js/dealbook.js"></script>

    <!-- Summary Expand Modal -->
    <div id="summary-modal" class="modal-overlay">
        <div class="modal-content-large">
            <div class="modal-header">
                <h3>회사소개</h3>
                <div style="display: flex; gap: 8px; align-items: center;">
                    <button id="ai-generate" class="btn-secondary"
                        style="padding: 6px 12px; font-size: 14px; display: flex; align-items: center; gap: 6px;">
                        <span class="material-symbols-outlined" style="font-size: 18px;">auto_awesome</span>
                        AI로 생성하기
                    </button>
                    <button class="btn-close" id="close-summary-modal">
                        <span class="material-symbols-outlined">close</span>
                    </button>
                </div>
            </div>
            <div class="modal-body">
                <textarea id="modal-summary-text" placeholder="회사소개 내용을 입력하세요..."></textarea>
            </div>
            <div class="modal-footer">
                <button id="save-summary" class="btn-primary">저장</button>
            </div>
        </div>
    </div>

    <!-- Register Deal Modal -->
    <div id="register-deal-modal" class="modal-overlay">
        <div class="modal-content-large" style="height: auto; max-width: 600px;">
            <div class="modal-header">
                <h3>매물 등록 상태</h3>
                <button class="btn-close" id="close-register-modal">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="modal-body" style="padding: 30px;">
                <form id="register-deal-form" style="width: 100%;">
                    <div class="form-group-row">
                        <label>회사이름</label>
                        <input type="text" name="company_name" placeholder="회사이름을 입력하세요">
                    </div>
                    <div class="form-group-row">
                        <label>Summary</label>
                        <textarea name="summary" rows="3" placeholder="회사 요약 내용을 입력하세요"></textarea>
                    </div>
                    <div class="form-group-row">
                        <label>산업</label>
                        <input type="text" name="industry" placeholder="산업 분야를 입력하세요">
                    </div>
                    <div class="form-group-row">
                        <label>매각방법</label>
                        <select name="sale_method" style="flex: 1; padding: 10px 15px; border: 1px solid var(--border-color); border-radius: 8px; font-family: inherit; font-size: 14px; outline: none; background-color: white;">
                            <option value="">매각 방법을 선택하세요</option>
                            <option value="지분매각(경영권포함)">지분매각(경영권포함)</option>
                            <option value="단순구주매각">단순구주매각</option>
                            <option value="영업양수도">영업양수도</option>
                            <option value="자산양수도">자산양수도</option>
                        </select>
                    </div>
                    <div class="form-group-row">
                        <label>매각금액</label>
                        <input type="text" name="sale_price" placeholder="매각 희망 금액을 입력하세요">
                    </div>
                    <div class="form-group-row">
                        <label>등록자</label>
                        <input type="text" name="registrant" placeholder="등록자 성함을 입력하세요">
                    </div>
                    <div class="form-group-row">
                        <label>기타</label>
                        <textarea name="others" rows="2" placeholder="기타 참고사항을 입력하세요"></textarea>
                    </div>
                    <div class="form-group-row">
                        <label>공유</label>
                        <div style="display: flex; gap: 20px; align-items: center; flex: 1;">
                            <label style="display: flex; align-items: center; gap: 5px; width: auto; font-weight: 400; margin-bottom: 0; cursor: pointer;">
                                <input type="radio" name="share_type" value="all" checked style="width: auto; flex: none;"> 전체공유
                            </label>
                            <label style="display: flex; align-items: center; gap: 5px; width: auto; font-weight: 400; margin-bottom: 0; cursor: pointer;">
                                <input type="radio" name="share_type" value="select" style="width: auto; flex: none;"> 선택공유
                            </label>
                            <label style="display: flex; align-items: center; gap: 5px; width: auto; font-weight: 400; margin-bottom: 0; cursor: pointer;">
                                <input type="radio" name="share_type" value="noselect" style="width: auto; flex: none;"> 공유안함
                            </label>
                        </div>
                    </div>
                    <div id="share-target-wrapper" class="form-group-row" style="display: none; flex-direction: column; align-items: flex-start; gap: 10px;">
                        <div style="display: flex; width: 100%; align-items: center; gap: 20px;">
                            <label></label>
                            <input type="text" id="share-with-input" placeholder="공유 대상 이름을 입력하고 엔터를 누르세요" style="flex: 1;">
                        </div>
                        <div id="share-tags-container" style="display: flex; flex-wrap: wrap; gap: 8px; margin-left: 120px;">
                            <!-- Tags will be added here -->
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer" style="display: flex; gap: 12px; justify-content: flex-end; padding: 20px 30px; border-top: 1px solid var(--border-color);">
                <button type="button" class="btn-secondary" id="cancel-register">취소</button>
                <button type="button" class="btn-primary" id="save-deal">등록하기</button>
            </div>
        </div>
    </div>

    <style>
        .form-group-row {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            gap: 20px;
        }
        .form-group-row label {
            width: 100px;
            font-weight: 600;
            color: var(--text-main);
            font-size: 14px;
        }
        .form-group-row input, 
        .form-group-row textarea {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group-row input:focus, 
        .form-group-row textarea:focus {
            border-color: var(--primary-color);
        }
        .form-group-row textarea {
            resize: vertical;
        }

        /* Tag Styles */
        .share-tag {
            display: flex;
            align-items: center;
            gap: 5px;
            background-color: #f0f2f5;
            padding: 4px 10px;
            border-radius: 16px;
            font-size: 13px;
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }
        .share-tag .remove-tag {
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            color: #888;
        }
        .share-tag .remove-tag:hover {
            color: #ff4d4f;
        }
    </style>
</body>

</html>
