<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DealChat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Pretendard Font -->
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" integrity="sha384-uGEvnSEpW2nM9xJFsrxrwakwrk9QdDTQIBJh0hVMu90OaVyMAMpAK1rIn0/Kh1/k" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="../img/dealchat-favicon.png">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <link rel="stylesheet" href="../css/style.css">

</head>

<body class="auth-page">
    <script>
        try {
            var _u = JSON.parse(localStorage.getItem('dealchat_users'));
            if (_u && _u.isLoggedIn === true) {
                window.location.href = _u.role === 'buyer' ? './total_sellers.html' : './index.html';
            }
        } catch (e) { }
    </script>
    <!-- Header Removed -->

    <main class="main-content">

        <div class="login-box">
            <h1 class="page-title">환영합니다</h1>
            <p class="page-subtitle">DealChat에 오신 것을 환영합니다.</p>

            <form id="signin-form">
                <div class="form-group">
                    <label>ID</label>
                    <input type="email" id="user-email" placeholder="아이디(이메일)를 입력하세요" required>
                </div>

                <div class="form-group" style="margin-top: 20px;">
                    <label>PW</label>
                    <input type="password" id="user-password" placeholder="비밀번호를 입력하세요" required>
                </div>

                <button type="submit" class="btn-login">로그인</button>

                <div class="forgot-password">
                    <a href="forgot-password.html">비밀번호를 잊으셨나요?</a>
                </div>

                <div class="divider"></div>

                <div class="signup-section">
                    <button type="button" class="btn-signup-link" onclick="location.href='signup.html'">회원가입</button>
                </div>
            </form>
        </div>
    </main>

    <footer id="global-footer"></footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.103.0" integrity="sha384-PsnFqJ58vyp7buRfuvdS2SrjRdUYinBv6lWwJXx3xQ17hWefo/UkwXowVBT53ubG" crossorigin="anonymous"></script>
    <script src="../js/helpers.js"></script>
    <script src="../js/front-config.js"></script>
    <script src="../js/footer_loader.js"></script>
    <script src="../js/signin.js" type="module"></script>
</body>

</html>
