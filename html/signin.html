<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - DealChat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: white;
            border-bottom: 1px solid #e5e7eb;
            padding: 0 5%;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 60px;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            font-weight: 800;
            color: #000;
            letter-spacing: -0.5px;
            cursor: pointer;
        }

        .nav {
            display: flex;
            gap: 40px;
        }

        .nav a {
            text-decoration: none;
            color: #333;
            font-size: 15px;
            font-weight: 600;
            transition: color 0.2s;
        }

        .nav a:hover {
            color: #8b5cf6;
        }

        .btn-header-login {
            background: linear-gradient(135deg, #9d7cff, #8b5cf6);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: transform 0.2s;
        }

        .btn-header-login:hover {
            transform: translateY(-1px);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
        }

        .page-title {
            font-size: 32px;
            font-weight: 700;
            color: #333;
            margin-bottom: 50px;
        }

        .login-box {
            background: white;
            width: 100%;
            max-width: 520px;
            padding: 60px 70px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            border: 1px solid #f0f0f0;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 4px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input::placeholder {
            color: #bbb;
        }

        .form-group input:focus {
            border-color: #9d7cff;
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, #9d7cff, #8b5cf6);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s;
        }

        .btn-login:hover {
            transform: translateY(-1px);
        }

        .forgot-password {
            text-align: center;
            margin-top: 20px;
            margin-bottom: 35px;
            font-size: 14px;
            color: #666;
        }

        .forgot-password a {
            color: #9d7cff;
            text-decoration: none;
            font-weight: 500;
            margin-left: 8px;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        .divider {
            height: 1px;
            background: #e5e7eb;
            margin: 35px 0;
        }

        .signup-section {
            text-align: center;
        }

        .signup-section p {
            font-size: 16px;
            font-weight: 700;
            color: #333;
            margin-bottom: 24px;
        }

        .btn-signup {
            width: 100%;
            background: white;
            color: #9d7cff;
            border: 1px solid #9d7cff;
            padding: 14px;
            border-radius: 4px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-signup:hover {
            background: rgba(157, 124, 255, 0.05);
        }

        @media (max-width: 768px) {
            .nav {
                display: none;
            }

            .login-box {
                padding: 40px 30px;
            }
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="header-left">
            <div class="logo" onclick="location.href='../index.html'">:DEALCHAT</div>
            <nav class="nav">
                <a href="#">M&A거래</a>
                <a href="#">스타트업정보</a>
                <a href="#">콘텐츠</a>
                <a href="#">상담문의</a>
            </nav>
        </div>
        <button class="btn-header-login">
            <span class="material-symbols-outlined" style="font-size: 18px;">login</span>
            로그인
        </button>
    </header>

    <main class="main-content">
        <h1 class="page-title">로그인</h1>

        <div class="login-box">
            <form id="signin-form">
                <div class="form-group">
                    <label>아이디(이메일주소)</label>
                    <input type="email" id="user-email" placeholder="이메일을 입력하세요." required>
                </div>

                <div class="form-group">
                    <label>비밀번호</label>
                    <input type="password" id="user-password" placeholder="비밀번호를 입력하세요." required>
                </div>

                <button type="submit" class="btn-login">로그인</button>

                <div class="forgot-password">
                    비밀번호를 잊으셨나요?
                    <a href="#">비밀번호 찾기</a>
                </div>

                <div class="divider"></div>

                <div class="signup-section">
                    <p>아직 회원이 아니세요?</p>
                    <button type="button" class="btn-signup" onclick="location.href='signup.html'">회원가입</button>
                </div>
            </form>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../js/helpers.js"></script>
    <script src="../js/front-config.js"></script>
    <script src="../js/signin.js" type="module"></script>
</body>

</html>
