<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DealChat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <link rel="stylesheet" href="../css/style.css">
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background-color: #ffffff !important;
            /* White Background for Light Theme */
            color: #333333;
        }

        /* Header removed as requested */
        /* Logo removed as requested */

        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background-color: #ffffff !important;
            padding-bottom: 0;
        }

        .login-box {
            background-color: #ffffff !important;
            /* White Background */
            border: 1px solid #ebebeb !important;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06) !important;
            /* Refined shadow */
            padding: 60px 50px;
            border-radius: 24px;
            max-width: 480px;
            width: 100%;
        }

        .page-title {
            font-family: 'Outfit', sans-serif;
            /* Enforce Outfit */
            font-size: 24px;
            margin-bottom: 12px;
            text-align: center;
            letter-spacing: -0.5px;
            color: #000000;
            font-weight: 700;
        }

        .page-subtitle {
            text-align: center;
            color: #666666;
            margin-bottom: 40px;
            font-size: 15px;
            font-weight: 400;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #333333 !important;
            margin-bottom: 8px;
            display: block;
        }

        .form-group input {
            background: #ffffff !important;
            border: 1px solid #dddddd !important;
            height: 52px;
            padding: 0 16px;
            color: #333333 !important;
            font-size: 16px;
            transition: all 0.2s ease;
            border-radius: 8px;
            width: 100%;
        }

        .form-group input::placeholder {
            color: #999999;
        }

        .form-group input:focus {
            background: #ffffff !important;
            border-color: #1E293B !important;
            /* Navy focus */
            box-shadow: 0 0 0 4px rgba(30, 41, 59, 0.1) !important;
        }

        .btn-login {
            width: 100%;
            height: 52px;
            font-size: 16px;
            letter-spacing: 0.5px;
            margin-top: 24px;
            box-shadow: 0 4px 12px rgba(30, 41, 59, 0.2);
            background: #1E293B;
            /* Main Navy Color */
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-login:hover {
            background: #161D2B;
            /* Slightly darker navy */
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(30, 41, 59, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .forgot-password {
            margin-top: 24px;
            margin-bottom: 24px;
            text-align: center;
        }

        .forgot-password a {
            color: #666666;
            text-decoration: none;
            font-size: 14px;
        }

        .forgot-password a:hover {
            color: #1E293B;
            text-decoration: underline;
        }

        .divider {
            background: #eeeeee;
            height: 1px;
            margin: 24px 0;
            width: 100%;
        }

        .signup-section {
            text-align: center;
        }

        .btn-signup {
            width: 100%;
            background: transparent;
            border: 1px solid #dddddd;
            color: #333333;
            height: 48px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-signup:hover {
            background: #ffffff;
            border-color: #1E293B;
            color: #1E293B;
            box-shadow: 0 0 0 1px #1E293B inset;
            /* Make border look thicker or just clear */
        }
    </style>
</head>

<body>
    <!-- Header Removed -->

    <main class="main-content">

        <div class="login-box">
            <h1 class="page-title">환영합니다</h1>
            <p class="page-subtitle">DealChat에 오신 것을 환영합니다.</p>

            <form id="signin-form">
                <div class="form-group">
                    <label>ID</label>
                    <input type="email" id="user-email" placeholder="아이디(이메일)를 입력하세요" required>
                </div>

                <div class="form-group" style="margin-top: 20px;">
                    <label>PW</label>
                    <input type="password" id="user-password" placeholder="비밀번호를 입력하세요" required>
                </div>

                <button type="submit" class="btn-login">로그인</button>

                <div class="forgot-password">
                    <a href="#">비밀번호를 잊으셨나요?</a>
                </div>

                <div class="divider"></div>

                <div class="signup-section">
                    <button type="button" class="btn-signup" onclick="location.href='signup.html'">회원가입</button>
                </div>
            </form>
        </div>
    </main>

    <footer id="global-footer"></footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/helpers.js"></script>
    <script src="../js/front-config.js"></script>
    <script src="../js/footer_loader.js"></script>
    <script src="../js/signin.js" type="module"></script>
</body>

</html>
