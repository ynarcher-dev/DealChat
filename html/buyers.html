<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyers - DealChat</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <!-- AG Grid -->
    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/ag-grid-community.min.js"></script>
</head>

<body>
    <div class="app-container">

        <main class="main-content">
            <header class="top-bar">
                <div class="logo" style="cursor: pointer;" onclick="location.href='./index.html'">
                    <img src="../img/logo.png" style="height: 24px;">
                </div>
                <div class="search-container"
                    style="display: flex; gap: 10px; flex: 1; max-width: 600px; margin: 0 40px;">
                    <div class="input-wrapper"
                        style="flex: 1; padding: 5px 15px; border-radius: 20px; box-shadow: none;">
                        <input type="text" id="search-input" placeholder="매수자명 또는 ID 검색..."
                            style="width: 100%; border: none; outline: none; background: transparent;">
                    </div>
                    <button id="search-btn" class="btn-primary" style="padding: 8px 20px;">검색</button>
                    <button id="new-btn" class="btn-secondary" style="padding: 8px 20px;">New</button>
                </div>
            </header>

            <section class="grid-container" style="padding: 24px; flex: 1;">
                <div id="buyerGrid" class="ag-theme-alpine" style="height: 100%; width: 100%;"></div>
            </section>
        </main>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../js/front-config.js"></script>
    <script src="../js/buyers.js" type="module"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-grid.css');
        @import url('https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-theme-alpine.css');

        .ag-theme-alpine {
            --ag-border-color: var(--border-color);
            --ag-header-background-color: #f1f3f4;
            --ag-odd-row-background-color: #fafafa;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: var(--shadow-md);
        }

        .ag-row {
            cursor: pointer;
        }

        /* Buyer Modal Styles */
        .form-group-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            gap: 12px;
        }

        .form-group-row label {
            width: 100px;
            font-weight: 600;
            color: var(--text-main);
            font-size: 14px;
            text-align: right;
        }

        .form-group-row input,
        .form-group-row textarea {
            flex: 1;
            padding: 6px 12px;
            border: 1px solid #d1d9e6;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
            background-color: #fff;
        }

        .form-group-row input:focus,
        .form-group-row textarea:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(66, 133, 244, 0.1);
        }



        /* Tag Input Styles */
        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 6px 12px;
            border: 1px solid #d1d9e6;
            border-radius: 6px;
            background-color: #fff;
            min-height: 42px;
            align-items: center;
            flex: 1;
        }

        .tag-container:focus-within {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(66, 133, 244, 0.1);
        }

        .tag-item {
            background-color: #e8f0fe;
            color: var(--primary-color);
            padding: 2px 10px;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tag-remove {
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
            color: var(--primary-color);
            opacity: 0.7;
            display: flex;
            align-items: center;
        }

        .tag-remove:hover {
            opacity: 1;
        }

        #selective-users-input {
            border: none;
            outline: none;
            flex: 1;
            min-width: 80px;
            padding: 4px 0;
            font-size: 14px;
            box-shadow: none;
        }
    </style>

    <!-- Register Buyer Modal -->
    <div id="buyer-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content-large">
            <div class="modal-header">
                <h3>바이어 등록</h3>
                <button class="btn-close" id="close-modal">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="modal-body" style="flex-direction: column;">
                <form id="buyer-form">
                    <div class="form-group-row">
                        <label>바이어ID</label>
                        <input type="text" name="id" placeholder="자동 생성됩니다" readonly>
                    </div>
                    <div class="form-group-row">
                        <label>바이어이름</label>
                        <input type="text" name="companyName" placeholder="바이어명을 입력하세요">
                    </div>
                    <div class="form-group-row">
                        <label>바이어요약</label>
                        <textarea name="summary" placeholder="바이어에 대해 간단히 요약하여 입력하세요." rows="5"></textarea>
                    </div>

                    <div class="form-group-row" style="margin-top: 24px; margin-bottom: 16px;">
                        <div style="width: 100px;"></div>
                        <div
                            style="flex: 1; font-weight: 600; color: var(--primary-color); font-size: 14px; border-bottom: 1px solid #eee; padding-bottom: 8px;">
                            투자 정보</div>
                    </div>

                    <div class="form-group-row">
                        <label>투자요약</label>
                        <textarea name="interest_summary" placeholder="관심 업종 및 지역 투자규모를 입력하세요" rows="5"></textarea>
                    </div>
                    <div class="form-group-row">
                        <label>투자산업</label>
                        <input type="text" name="interest_industry" placeholder="관심 업종을 입력하세요">
                    </div>
                    <div class="form-group-row">
                        <label>투자규모</label>
                        <div style="position: relative;">
                            <input type="text" name="investment_amount" placeholder="투자규모를 입력하세요"
                                style="padding-right: 50px;">
                            <span
                                style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #6c757d; pointer-events: none;">억원</span>
                        </div>
                    </div>
                    <div class="form-group-row">
                        <label>기타</label>
                        <input type="text" name="etc" placeholder="기타 정보를 입력하세요">
                    </div>

                    <!-- Visibility Scope -->
                    <div class="form-group-row">
                        <label>공개 범위</label>
                        <select name="visibility_scope" id="visibility-scope"
                            style="flex: 1; padding: 6px 12px; border: 1px solid #d1d9e6; border-radius: 6px; font-family: inherit; font-size: 14px; outline: none; background-color: #fff;">
                            <option value="private" selected>비공개</option>
                            <option value="public">전체공개</option>
                            <option value="selective">선택공개</option>
                        </select>
                    </div>

                    <!-- Selective Users Input (Tag Style) -->
                    <div class="form-group-row" id="selective-users-row" style="display: none;">
                        <label>공개 대상</label>
                        <div class="tag-container" id="tag-wrapper">
                            <!-- Tags will be inserted here dynamically -->
                            <input type="text" id="selective-users-input" placeholder="사용자 ID 입력 후 엔터">
                        </div>
                        <!-- Hidden input to store the actual comma-separated value -->
                        <input type="hidden" name="selective_users">
                    </div>

                    <!-- Timestamps -->
                    <div class="form-group-row">
                        <label style="color: #6c757d; font-size: 13px;">생성시간</label>
                        <input type="text" name="created_at" readonly
                            style="background-color: #f8f9fa; border-color: #e9ecef; color: #6c757d; font-size: 13px; cursor: default;">
                    </div>
                    <div class="form-group-row">
                        <label style="color: #6c757d; font-size: 13px;">수정시간</label>
                        <input type="text" name="updated_at" readonly
                            style="background-color: #f8f9fa; border-color: #e9ecef; color: #6c757d; font-size: 13px; cursor: default;">
                    </div>
                </form>
            </div>
            <div class="modal-footer" style="gap: 12px;">
                <button type="button" id="delete-buyer-btn" class="btn-cancel"
                    style="color: var(--danger-color); border-color: var(--danger-color); border-radius: 12px; padding: 10px 24px; margin-right: auto; display: none;">삭제</button>
                <button type="button" class="btn-primary" id="save-buyer-btn"
                    style="border-radius: 12px; padding: 10px 24px;">등록</button>
            </div>
        </div>
    </div>
</body>

</html>
