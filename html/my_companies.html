<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Companies - DealChat</title>
    <!-- Bootstrap CSS - Moved up to let style.css override it -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/url_helper.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Pretendard Font -->
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" integrity="sha384-uGEvnSEpW2nM9xJFsrxrwakwrk9QdDTQIBJh0hVMu90OaVyMAMpAK1rIn0/Kh1/k" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" integrity="sha384-+mbV2IY1Zk/X1p/nWllGySJSUN8uMs+gUAN10Or95UBH0fpj6GfKgPmgC5EXieXG" crossorigin="anonymous"></script>

    <script src="../js/profile_modal.js" type="module"></script>
</head>

<body class="theme-mode-companies" data-share-entity="기업">
    <!-- Global Loading Overlay -->
    <div id="global-loader">
        <div class="loader-logo">DealChat</div>
        <div class="loader-text"></div>
    </div>

    <!-- Transition Loader for Detail View -->
    <div id="transition-loader">
        <div class="spinner"></div>
        <div class="loader-text"></div>
    </div>

    <div class="app-container">

        <main class="main-content dashboard-bg">
            <header id="global-header" class="top-bar"></header>

            <section class="page-content">

                <div class="text-center mb-4">
                    <h1 class="page-title">My Companies</h1>
                    <p class="page-subtitle">내가 담당하는 기업 정보를 관리하세요.</p>
                </div>

                <div class="search-and-actions">

                    <!-- Centered Search Bar -->
                    <div class="search-centered-wrap">
                        <div class="input-wrapper">
                            <input type="text" id="search-input" placeholder="기업명, ID 또는 키워드로 검색해주세요">
                            <button id="search-icon-btn">
                                <span class="material-symbols-outlined">search</span>
                            </button>
                        </div>
                    </div>

                    <!-- Right: Action Icons -->
                    <div class="actions-right">
                        <button id="export-csv-btn" class="btn-icon-round" title="CSV 다운로드">
                            <span class="material-symbols-outlined">download</span>
                        </button>
                        <button id="new-btn" class="btn-icon-round primary" title="기업 등록">
                            <span class="material-symbols-outlined">add</span>
                        </button>
                    </div>
                </div>

                <!-- Collapsible Filter Container -->
                <div id="filter-container" class="filter-panel">
                    <!-- Industry Filter -->
                    <div class="filter-group mb-4">
                        <div class="filter-group-header mb-3">
                            <label class="filter-group-label">산업분야</label>
                            <button id="reset-filters" class="btn-filter-reset">선택 해제</button>
                        </div>
                        <div id="filter-industry-list" class="d-flex flex-wrap gap-2">
                            <!-- Industry checkboxes will be injected here -->
                        </div>
                    </div>

                    <!-- Row for Status and Visibility -->
                    <div class="row">
                        <!-- Management Status Filter -->
                        <div class="col-md-4">
                            <div class="filter-group mb-4">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <label class="filter-group-label">관리 현황</label>
                                </div>
                                <div id="filter-mgmt-list" class="d-flex flex-wrap gap-2">
                                    <div class="filter-item">
                                        <input type="checkbox" class="btn-check mgmt-checkbox" id="filter-mgmt-발굴"
                                            value="발굴기업" autocomplete="off">
                                        <label class="industry-checkbox-label" for="filter-mgmt-발굴">발굴기업</label>
                                    </div>
                                    <div class="filter-item">
                                        <input type="checkbox" class="btn-check mgmt-checkbox" id="filter-mgmt-보육"
                                            value="보육기업" autocomplete="off">
                                        <label class="industry-checkbox-label" for="filter-mgmt-보육">보육기업</label>
                                    </div>
                                    <div class="filter-item">
                                        <input type="checkbox" class="btn-check mgmt-checkbox" id="filter-mgmt-투자"
                                            value="투자기업" autocomplete="off">
                                        <label class="industry-checkbox-label" for="filter-mgmt-투자">투자기업</label>
                                    </div>
                                    <div class="filter-item">
                                        <input type="checkbox" class="btn-check mgmt-checkbox" id="filter-mgmt-기타"
                                            value="기타" autocomplete="off">
                                        <label class="industry-checkbox-label" for="filter-mgmt-기타">기타</label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Visibility Filter -->
                        <div class="col-md-2">
                            <div class="filter-group mb-4">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <label class="filter-group-label">공개 여부</label>
                                </div>
                                <div id="filter-visibility-list" class="d-flex flex-nowrap gap-2">
                                    <div class="filter-item">
                                        <input type="checkbox" class="btn-check visibility-checkbox"
                                            id="filter-vis-public" value="public" autocomplete="off">
                                        <label class="industry-checkbox-label" for="filter-vis-public">공개</label>
                                    </div>
                                    <div class="filter-item">
                                        <input type="checkbox" class="btn-check visibility-checkbox"
                                            id="filter-vis-private" value="private" autocomplete="off">
                                        <label class="industry-checkbox-label" for="filter-vis-private">비공개</label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Investment Stage Filter -->
                        <div class="col-md-6">
                            <div class="filter-group mb-4">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <label class="filter-group-label">투자단계</label>
                                </div>
                                <div id="filter-stage-list" class="d-flex flex-nowrap gap-2">
                                    <div class="filter-item">
                                        <input type="checkbox" class="btn-check stage-checkbox" id="filter-stage-all" value="all" autocomplete="off">
                                        <label class="industry-checkbox-label" for="filter-stage-all">전체</label>
                                    </div>
                                    <div class="filter-item">
                                        <input type="checkbox" class="btn-check stage-checkbox" id="filter-stage-seed" value="Seed" autocomplete="off">
                                        <label class="industry-checkbox-label" for="filter-stage-seed">Seed</label>
                                    </div>
                                    <div class="filter-item">
                                        <input type="checkbox" class="btn-check stage-checkbox" id="filter-stage-prea" value="Pre-A" autocomplete="off">
                                        <label class="industry-checkbox-label" for="filter-stage-prea">Pre-A</label>
                                    </div>
                                    <div class="filter-item">
                                        <input type="checkbox" class="btn-check stage-checkbox" id="filter-stage-a" value="Series A" autocomplete="off">
                                        <label class="industry-checkbox-label" for="filter-stage-a">Series A</label>
                                    </div>
                                    <div class="filter-item">
                                        <input type="checkbox" class="btn-check stage-checkbox" id="filter-stage-bplus" value="Series B+" autocomplete="off">
                                        <label class="industry-checkbox-label" for="filter-stage-bplus">Series B이상</label>
                                    </div>
                                    <div class="filter-item">
                                        <input type="checkbox" class="btn-check stage-checkbox" id="filter-stage-ma" value="M&A" autocomplete="off">
                                        <label class="industry-checkbox-label" for="filter-stage-ma">M&amp;A</label>
                                    </div>
                                    <div class="filter-item">
                                        <input type="checkbox" class="btn-check stage-checkbox" id="filter-stage-ipo" value="IPO" autocomplete="off">
                                        <label class="industry-checkbox-label" for="filter-stage-ipo">IPO</label>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="row g-4">
                        <!-- Revenue Range Filter -->
                        <div class="col-md-6">
                            <label class="filter-range-label">매출액 범위 (억)</label>
                            <div class="d-flex align-items-center gap-2">
                                <input type="number" id="filter-min-revenue" class="form-control filter-range-input" placeholder="최소">
                                <span class="text-muted">~</span>
                                <input type="number" id="filter-max-revenue" class="form-control filter-range-input" placeholder="최대">
                            </div>
                        </div>
                        <!-- Investment Range Filter -->
                        <div class="col-md-6">
                            <label class="filter-range-label">누적투자금 범위 (억)</label>
                            <div class="d-flex align-items-center gap-2">
                                <input type="number" id="filter-min-investment" class="form-control filter-range-input" placeholder="최소">
                                <span class="text-muted">~</span>
                                <input type="number" id="filter-max-investment" class="form-control filter-range-input" placeholder="최대">
                            </div>
                        </div>
                    </div>

                </div>

                <!-- Table Header Section: Title & Sort -->
                <div class="d-flex justify-content-between align-items-end mb-3 px-1">
                    <div class="list-section-title">기업 목록</div>
                    <div class="dropdown">
                        <button
                            class="btn btn-outline-secondary dropdown-toggle sort-dropdown-btn d-flex align-items-center justify-content-between p-2"
                            type="button" id="sort-dropdown-btn" data-bs-toggle="dropdown" aria-expanded="false">
                            <div class="d-flex align-items-center gap-2">
                                <span class="material-symbols-outlined" style="font-size: 18px; color: #64748b;">sort</span>
                                <span id="current-sort-label">최근 등록순</span>
                            </div>
                            <span class="material-symbols-outlined" style="font-size: 18px; color: #94a3b8;">expand_more</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end border-0 shadow-lg p-2 mt-2"
                            aria-labelledby="sort-dropdown-btn"
                            style="border-radius: 12px; min-width: 180px;">
                            <li><a class="dropdown-item rounded-3 py-2 sort-option active" href="#" data-sort="latest">최근 등록순</a></li>
                            <li><a class="dropdown-item rounded-3 py-2 sort-option" href="#" data-sort="oldest">오래된 등록순</a></li>
                            <li class="dropdown-divider my-1"></li>
                            <li><a class="dropdown-item rounded-3 py-2 sort-option" href="#" data-sort="name_asc">기업 이름순 (ㄱ-ㅎ)</a></li>
                            <li><a class="dropdown-item rounded-3 py-2 sort-option" href="#" data-sort="name_desc">기업 이름순 (ㅎ-ㄱ)</a></li>
                            <li class="dropdown-divider my-1"></li>
                            <li><a class="dropdown-item rounded-3 py-2 sort-option" href="#" data-sort="revenue_desc">매출액 높은순</a></li>
                            <li><a class="dropdown-item rounded-3 py-2 sort-option" href="#" data-sort="revenue_asc">매출액 낮은순</a></li>
                            <li class="dropdown-divider my-1"></li>
                            <li><a class="dropdown-item rounded-3 py-2 sort-option" href="#" data-sort="investment_desc">누적투자금 높은순</a></li>
                            <li><a class="dropdown-item rounded-3 py-2 sort-option" href="#" data-sort="investment_asc">누적투자금 낮은순</a></li>
                        </ul>
                    </div>
                </div>

                <!-- Companies Table Container -->
                <div id="company-list-wrap" class="list-table-wrap">
                    <div class="table-responsive">
                        <table class="table table-hover m-0" style="table-layout: fixed; vertical-align: middle;">
                            <thead>
                                <tr>
                                    <th class="list-th" style="width: 240px;">기업명</th>
                                    <th class="list-th" style="width: 140px;">산업</th>
                                    <th class="list-th" style="width: 90px;">매출액</th>
                                    <th class="list-th" style="width: 100px;">누적투자금</th>
                                    <th class="list-th" style="width: 300px;">비공개 메모 (작성자만 확인 가능)</th>
                                    <th class="list-th" style="width: 180px;">담당자</th>
                                    <th class="list-th" style="width: 110px;">등록일</th>
                                    <th class="list-th" style="width: 70px;">공유</th>
                                </tr>
                            </thead>
                            <tbody id="company-list-container">
                                <!-- Table rows will be injected here -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Pagination -->
                <div id="pagination-container" class="d-flex justify-content-center mt-5" style="gap: 8px;">
                    <!-- Pagination buttons will be injected here -->
                </div>
            </section>
            <footer id="global-footer"></footer>
        </main>
    </div>


    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.103.0" integrity="sha384-PsnFqJ58vyp7buRfuvdS2SrjRdUYinBv6lWwJXx3xQ17hWefo/UkwXowVBT53ubG" crossorigin="anonymous"></script>
    <script src="../js/front-config.js"></script>
    <script src="../js/header_loader.js"></script>
    <script src="../js/footer_loader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="../js/modal_loader.js"></script>
    <script src="../js/my_companies.js?v=20260308_06" type="module"></script>
</body>


</html>
