<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - DealChat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: white;
            border-bottom: 1px solid #e5e7eb;
            padding: 0 5%;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 60px;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            font-weight: 800;
            color: #000;
            letter-spacing: -0.5px;
            cursor: pointer;
        }

        .nav {
            display: flex;
            gap: 40px;
        }

        .nav a {
            text-decoration: none;
            color: #333;
            font-size: 15px;
            font-weight: 600;
            transition: color 0.2s;
        }

        .nav a:hover {
            color: #8b5cf6;
        }

        .btn-header-login {
            background: linear-gradient(135deg, #9d7cff, #8b5cf6);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: transform 0.2s;
        }

        .btn-header-login:hover {
            transform: translateY(-1px);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px 80px;
        }

        .page-title {
            font-size: 32px;
            font-weight: 700;
            color: #333;
            margin-bottom: 50px;
        }

        .signup-box {
            background: white;
            width: 100%;
            max-width: 520px;
            padding: 60px 70px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            border: 1px solid #f0f0f0;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }

        .form-group label .required {
            color: #9d7cff;
            margin-left: 4px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 4px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input::placeholder {
            color: #bbb;
        }

        .form-group input:focus {
            border-color: #9d7cff;
        }

        .password-hint {
            font-size: 12px;
            color: #999;
            margin-top: 6px;
        }

        .btn-signup {
            width: 100%;
            background: linear-gradient(135deg, #9d7cff, #8b5cf6);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s;
        }

        .btn-signup:hover {
            transform: translateY(-1px);
        }

        .btn-signup:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .divider {
            height: 1px;
            background: #e5e7eb;
            margin: 35px 0;
        }

        .login-section {
            text-align: center;
        }

        .login-section p {
            font-size: 16px;
            font-weight: 700;
            color: #333;
            margin-bottom: 24px;
        }

        .btn-login-link {
            width: 100%;
            background: white;
            color: #9d7cff;
            border: 1px solid #9d7cff;
            padding: 14px;
            border-radius: 4px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-login-link:hover {
            background: rgba(157, 124, 255, 0.05);
        }

        .terms-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #f0f0f0;
        }

        .checkbox-group {
            display: flex;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 10px;
            margin-top: 2px;
            cursor: pointer;
            accent-color: #9d7cff;
        }

        .checkbox-group label {
            font-size: 14px;
            color: #555;
            cursor: pointer;
            line-height: 1.5;
        }

        .checkbox-group label a {
            color: #9d7cff;
            text-decoration: none;
        }

        .checkbox-group label a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .nav {
                display: none;
            }

            .signup-box {
                padding: 40px 30px;
            }
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="header-left">
            <div class="logo" onclick="location.href='../index.html'">:DEALCHAT</div>
            <nav class="nav">
                <a href="#">M&A거래</a>
                <a href="#">스타트업정보</a>
                <a href="#">콘텐츠</a>
                <a href="#">상담문의</a>
            </nav>
        </div>
        <button class="btn-header-login" onclick="location.href='signin.html'">
            <span class="material-symbols-outlined" style="font-size: 18px;">login</span>
            로그인
        </button>
    </header>

    <main class="main-content">
        <h1 class="page-title">회원가입</h1>

        <div class="signup-box">
            <form id="signup-form">
                <div class="form-group">
                    <label>이메일 주소<span class="required">*</span></label>
                    <input type="email" id="user-email" placeholder="이메일을 입력하세요." required>
                </div>

                <div class="form-group">
                    <label>비밀번호<span class="required">*</span></label>
                    <input type="password" id="user-password" placeholder="비밀번호를 입력하세요." required>
                    <div class="password-hint">8자 이상, 영문/숫자/특수문자 조합</div>
                </div>

                <div class="form-group">
                    <label>비밀번호 확인<span class="required">*</span></label>
                    <input type="password" id="user-password-confirm" placeholder="비밀번호를 다시 입력하세요." required>
                </div>

                <div class="form-group">
                    <label>이름<span class="required">*</span></label>
                    <input type="text" id="user-name" placeholder="이름을 입력하세요." required>
                </div>

                <div class="form-group">
                    <label>회사명</label>
                    <input type="text" id="user-company" placeholder="회사명을 입력하세요. (선택)">
                </div>

                <div class="terms-section">
                    <div class="checkbox-group">
                        <input type="checkbox" id="agree-all">
                        <label for="agree-all">전체 동의</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="agree-terms" class="agree-item" required>
                        <label for="agree-terms"><a href="#" target="_blank">이용약관</a>에 동의합니다. (필수)</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="agree-privacy" class="agree-item" required>
                        <label for="agree-privacy"><a href="#" target="_blank">개인정보 처리방침</a>에 동의합니다. (필수)</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="agree-marketing" class="agree-item">
                        <label for="agree-marketing">마케팅 정보 수신에 동의합니다. (선택)</label>
                    </div>
                </div>

                <button type="submit" class="btn-signup">회원가입</button>

                <div class="divider"></div>

                <div class="login-section">
                    <p>이미 계정이 있으신가요?</p>
                    <button type="button" class="btn-login-link" onclick="location.href='signin.html'">로그인</button>
                </div>
            </form>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../js/helpers.js"></script>
    <script src="../js/front-config.js"></script>
    <script src="../js/signup.js" type="module"></script>
</body>

</html>
