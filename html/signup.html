<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - DealChat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <link rel="stylesheet" href="../css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #ffffff;
            /* White BG for Light Theme */
            color: #333333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header Removed */

        .btn-back {
            position: absolute;
            top: 24px;
            left: 24px;
            background: transparent;
            border: none;
            color: #202124;
            /* Dark color for light bg */
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 8px;
            transition: all 0.2s;
            opacity: 0.8;
        }

        .btn-back:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            opacity: 1;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* Center Vertically */
            padding: 40px 20px;
        }

        .page-title {
            font-family: 'Outfit', sans-serif;
            /* Enforce Outfit */
            font-size: 32px;
            font-weight: 700;
            color: #202124;
            margin-bottom: 30px;
            text-align: center;
        }

        .signup-box {
            background: #ffffff;
            width: 100%;
            max-width: 520px;
            padding: 50px 60px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06);
            border: 1px solid #ebebeb;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333333;
            margin-bottom: 8px;
        }

        .form-group label .required {
            color: #1E293B;
            /* Navy Required Asterisk */
            margin-left: 4px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #dddddd;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
            color: #333333;
            background: #ffffff;
        }

        .form-group input::placeholder {
            color: #999999;
        }

        .form-group input:focus {
            border-color: #1E293B;
            box-shadow: 0 0 0 3px rgba(30, 41, 59, 0.1);
        }

        .phone-input-group {
            display: flex;
            gap: 8px;
        }

        .phone-input-group input {
            flex: 1;
        }

        .btn-send-code,
        .btn-verify-code {
            padding: 0 16px;
            white-space: nowrap;
            background: #ffffff;
            border: 1px solid #dddddd;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #333333;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-send-code:hover,
        .btn-verify-code:hover {
            border-color: #1E293B;
            color: #1E293B;
        }

        .btn-send-code:disabled,
        .btn-verify-code:disabled {
            background: #f1f5f9;
            color: #94a3b8;
            border-color: #e2e8f0;
            cursor: not-allowed;
        }

        .verification-area {
            margin-top: 10px;
            padding: 16px;
            background: #f8fafc;
            border-radius: 12px;
            display: none;
            /* Initially hidden */
        }

        .verification-timer {
            font-size: 12px;
            color: #ef4444;
            margin-top: 6px;
            display: block;
        }

        .verified-badge {
            display: none;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            color: #10b981;
            font-weight: 600;
            margin-top: 8px;
        }

        .password-hint {
            font-size: 12px;
            color: #888888;
            margin-top: 6px;
        }

        .btn-signup {
            width: 100%;
            background: #1E293B;
            /* Navy Button */
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(30, 41, 59, 0.2);
        }

        .btn-signup:hover {
            background: #161D2B;
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(30, 41, 59, 0.3);
        }

        .btn-signup:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .divider {
            height: 1px;
            background: #eeeeee;
            margin: 30px 0;
        }

        .login-section {
            text-align: center;
        }

        .login-section p {
            font-size: 14px;
            font-weight: 400;
            color: #666666;
            margin-bottom: 12px;
        }

        .btn-login-link {
            width: 100%;
            background: transparent;
            color: #333333;
            border: 1px solid #dddddd;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-login-link:hover {
            background: #ffffff;
            border-color: #1E293B;
            color: #1E293B;
            box-shadow: 0 0 0 1px #1E293B inset;
        }

        .terms-section {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #eeeeee;
        }

        .checkbox-group {
            display: flex;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 10px;
            margin-top: 2px;
            cursor: pointer;
            accent-color: #1E293B;
            /* Navy Checkbox */
        }

        .checkbox-group label {
            font-size: 14px;
            color: #555;
            cursor: pointer;
            line-height: 1.5;
        }

        .checkbox-group label a {
            color: #1E293B;
            text-decoration: none;
            font-weight: 600;
        }

        .checkbox-group label a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .signup-box {
                padding: 40px 30px;
            }
        }
    </style>
</head>

<body>
    <button class="btn-back" onclick="location.href='../index.html'">
        <span class="material-symbols-outlined">arrow_back</span>
        이전으로
    </button>

    <main class="main-content">
        <h1 class="page-title">회원가입</h1>

        <div class="signup-box">
            <form id="signup-form">
                <div class="form-group">
                    <label>이메일 주소<span class="required">*</span></label>
                    <input type="email" id="user-email" placeholder="이메일을 입력하세요." required>
                </div>

                <div class="form-group">
                    <label>비밀번호<span class="required">*</span></label>
                    <input type="password" id="user-password" placeholder="비밀번호를 입력하세요." required>
                    <div class="password-hint">8자 이상, 영문/숫자/특수문자 조합</div>
                </div>

                <div class="form-group">
                    <label>비밀번호 확인<span class="required">*</span></label>
                    <input type="password" id="user-password-confirm" placeholder="비밀번호를 다시 입력하세요." required>
                </div>

                <div class="form-group">
                    <label>이름<span class="required">*</span></label>
                    <input type="text" id="user-name" placeholder="이름을 입력하세요." required>
                </div>

                <div class="form-group">
                    <label>휴대폰 번호<span class="required">*</span></label>
                    <div class="phone-input-group">
                        <input type="tel" id="user-phone" placeholder="010-0000-0000" maxlength="13" required>
                        <button type="button" id="btn-send-code" class="btn-send-code">인증번호 발송</button>
                    </div>
                    <div id="verification-area" class="verification-area">
                        <label style="font-size: 12px; color: #64748b;">인증번호 입력</label>
                        <div class="phone-input-group">
                            <input type="text" id="verification-code" placeholder="6자리 숫자" maxlength="6">
                            <button type="button" id="btn-verify-code" class="btn-verify-code">확인</button>
                        </div>
                        <span id="verification-timer" class="verification-timer">03:00</span>
                    </div>
                    <div id="verified-badge" class="verified-badge">
                        <span class="material-symbols-outlined" style="font-size: 18px;">check_circle</span>
                        휴대폰 인증 완료
                    </div>
                </div>

                <div class="form-group">
                    <label>소속</label>
                    <input type="text" id="user-company" placeholder="회사명을 입력하세요. (선택)">
                </div>

                <div class="form-group">
                    <label>부서</label>
                    <input type="text" id="user-department" placeholder="부서명을 입력하세요. (선택)">
                </div>

                <div class="terms-section">
                    <div class="checkbox-group">
                        <input type="checkbox" id="agree-all">
                        <label for="agree-all">전체 동의</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="agree-terms" class="agree-item" required>
                        <label for="agree-terms"><a href="terms.html" target="_blank">이용약관</a>에 동의합니다. (필수)</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="agree-privacy" class="agree-item" required>
                        <label for="agree-privacy"><a href="privacy.html" target="_blank">개인정보 처리방침</a>에 동의합니다. (필수)</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="agree-marketing" class="agree-item">
                        <label for="agree-marketing"><a href="marketing.html" target="_blank">마케팅 정보 수신</a>에 동의합니다. (선택)</label>
                    </div>
                </div>

                <button type="submit" class="btn-signup">회원가입</button>

                <div class="divider"></div>

                <div class="login-section">
                    <p>이미 계정이 있으신가요?</p>
                    <button type="button" class="btn-login-link" onclick="location.href='signin.html'">로그인</button>
                </div>
            </form>
        </div>
    </main>

    <footer id="global-footer"></footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/helpers.js"></script>
    <script src="../js/front-config.js"></script>
    <script src="../js/footer_loader.js"></script>
    <script src="../js/signup.js" type="module"></script>
</body>

</html>
