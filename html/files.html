<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Files - DealChat</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <!-- AG Grid -->
    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/ag-grid-community.min.js"></script>
    <!-- PDF, Word, PPTX Extraction Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="app-container">

        <main class="main-content">
            <header class="top-bar">
                <div class="logo" style="cursor: pointer;" onclick="location.href='./index.html'">
                    <img src="../img/logo.png" style="height: 24px;">
                </div>
                <div class="search-container"
                    style="display: flex; gap: 10px; flex: 1; max-width: 600px; margin: 0 40px;">
                    <div class="input-wrapper"
                        style="flex: 1; padding: 5px 15px; border-radius: 20px; box-shadow: none;">
                        <input type="text" id="search-input" placeholder="파일명 검색..."
                            style="width: 100%; border: none; outline: none; background: transparent;">
                    </div>
                    <button id="search-btn" class="btn-primary" style="padding: 8px 20px;">검색</button>
                    <button id="upload-btn" class="btn-secondary" style="padding: 8px 20px;">Upload</button>
                    <input type="file" id="upload-file-input" style="display: none;">
                </div>
            </header>

            <section class="grid-container" style="padding: 24px; flex: 1;">
                <div id="fileGrid" class="ag-theme-alpine" style="height: 100%; width: 100%;"></div>
            </section>
        </main>
    </div>

    <!-- Bootstrap Modal -->
    <div class="modal fade" id="file-modal" tabindex="-1" aria-labelledby="fileModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-bottom-0 pt-4 px-4">
                    <h5 class="modal-title fw-bold" id="fileModalLabel">파일 상세</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body px-4 pb-4">
                    <form id="file-detail-form" class="container-fluid">
                        <!-- ID -->
                        <div class="row mb-4 align-items-center">
                            <label class="col-sm-2 col-form-label fw-bold text-muted">ID</label>
                            <div class="col-sm-10">
                                <input type="text" id="modal-id" class="form-control bg-light border-0 px-3 py-2"
                                    readonly style="font-family: monospace; cursor: not-allowed;">
                            </div>
                        </div>
                        <!-- 파일 이름 -->
                        <div class="row mb-4 align-items-center">
                            <label class="col-sm-2 col-form-label fw-bold">파일 이름
                            </label>
                            <div class="col-sm-10">
                                <div style="position: relative; display: flex; align-items: center;">
                                    <input type="text" id="modal-file-name-input"
                                        class="form-control bg-light border-0 px-3 py-2" readonly
                                        style="font-family: monospace; cursor: not-allowed; padding-right: 40px !important; width: 100%;">
                                    <a href="#" id="modal-location-icon" target="_blank"
                                        style="position: absolute; right: 12px; color: var(--text-secondary); height: 18px; line-height: 1;">
                                        <span class="material-symbols-outlined" style="font-size: 18px;">download</span>
                                    </a>
                                </div>
                            </div>
                        </div>
                        <!-- 요약 -->
                        <div class="row mb-4">
                            <label class="col-sm-2 col-form-label fw-bold pt-2">요약</label>
                            <div class="col-sm-10">
                                <div style="position: relative;">
                                    <textarea id="modal-summary"
                                        class="form-control border-secondary-subtle px-3 py-2 shadow-sm" rows="8"
                                        style="padding-right: 45px !important;"></textarea>
                                    <button type="button" id="AI-generate-summary"
                                        class="btn btn-link p-0 text-primary d-flex align-items-center" title="AI 요약 생성"
                                        style="text-decoration: none; position: absolute; top: 10px; right: 12px; z-index: 5;">
                                        <span class="material-symbols-outlined"
                                            style="font-size: 20px;">auto_awesome</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <!-- 태그 -->
                        <div class="row mb-4 align-items-center">
                            <label class="col-sm-2 col-form-label fw-bold">태그</label>
                            <div class="col-sm-10">
                                <div style="position: relative; display: flex; align-items: center;">
                                    <input type="text" id="modal-tags"
                                        class="form-control border-secondary-subtle px-3 py-2 shadow-sm"
                                        placeholder="쉼표로 구분" style="padding-right: 40px !important; width: 100%;">
                                    <button type="button" id="AI-generate-tags"
                                        class="btn btn-link p-0 text-primary d-flex align-items-center" title="AI 태그 생성"
                                        style="text-decoration: none; position: absolute; right: 12px; z-index: 5;">
                                        <span class="material-symbols-outlined"
                                            style="font-size: 20px;">auto_awesome</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <!-- 코멘츠 -->
                        <div class="row mb-4">
                            <label class="col-sm-2 col-form-label fw-bold pt-2">코멘트</label>
                            <div class="col-sm-10">
                                <textarea id="modal-comments"
                                    class="form-control border-secondary-subtle px-3 py-2 shadow-sm"
                                    rows="3"></textarea>
                            </div>
                        </div>
                        <!-- 파일위치 -->
                        <div class="row mb-4 align-items-center">
                            <label class="col-sm-2 col-form-label fw-bold">다운로드</label>
                            <div class="col-sm-10">
                                <a id="modal-location-btn"
                                    class="btn btn-primary px-4 py-2 rounded-pill shadow-sm d-flex align-items-center gap-2"
                                    style="width: fit-content;" target="_blank">
                                    <span class="material-symbols-outlined" style="font-size: 18px;">download</span>
                                    <span>Download</span>
                                </a>
                            </div>
                        </div>
                        <!-- Timestamps -->
                        <div class="row mb-4 align-items-center">
                            <label class="col-sm-2 col-form-label fw-bold text-muted small">생성시간</label>
                            <div class="col-sm-10">
                                <input type="text" id="modal-createdAt"
                                    class="form-control-plaintext bg-light border-0 px-3 py-2 rounded small" readonly>
                            </div>
                        </div>
                        <div class="row mb-4 align-items-center">
                            <label class="col-sm-2 col-form-label fw-bold text-muted small">수정시간</label>
                            <div class="col-sm-10">
                                <input type="text" id="modal-updatedAt"
                                    class="form-control-plaintext bg-light border-0 px-3 py-2 rounded small" readonly>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-top-0 px-4 pb-4">
                    <button type="button" id="delete-file-btn"
                        class="btn btn-danger px-4 py-2 rounded-pill fw-semibold shadow me-2">삭제</button>
                    <button type="button" id="save-file-btn"
                        class="btn btn-primary px-5 py-2 rounded-pill fw-semibold shadow">저장</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/front-config.js"></script>
    <script src="../js/files.js" type="module"></script>

    <style>
        @import url('https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-grid.css');
        @import url('https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-theme-alpine.css');

        .ag-theme-alpine {
            --ag-border-color: var(--border-color);
            --ag-header-background-color: #f1f3f4;
            --ag-odd-row-background-color: #fafafa;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: var(--shadow-md);
        }

        .ag-row {
            cursor: pointer;
        }

        .btn-primary {
            background-color: var(--primary-color) !important;
            border-color: var(--primary-color) !important;
        }

        /* Modal font size adjustment */
        #file-modal .col-form-label {
            font-size: 0.85rem;
        }

        #file-modal .form-control,
        #file-modal .form-control-plaintext {
            font-size: 0.85rem;
        }
    </style>
</body>

</html>
