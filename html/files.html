<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Companies Files - DealChat</title>
    <!-- Bootstrap CSS - Moved up -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <!-- AG Grid -->
    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@35.2.1/dist/ag-grid-community.min.js" integrity="sha384-rDpVEBXmk+lqowKuEMB9y1otKcek5RGQ35D+CoFcKZUGrbKrI2q2wNRxOulX1WGO" crossorigin="anonymous"></script>
    <!-- PDF, Word, PPTX Extraction Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" integrity="sha384-/1qUCSGwTur9vjf/z9lmu/eCUYbpOTgSjmpbMQZ1/CtX2v/WcAIKqRv+U1DUCG6e" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js" integrity="sha384-nFoSjZIoH3CCp8W639jJyQkuPHinJ2NHe7on1xvlUA7SuGfJAfvMldrsoAVm6ECz" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" integrity="sha384-+mbV2IY1Zk/X1p/nWllGySJSUN8uMs+gUAN10Or95UBH0fpj6GfKgPmgC5EXieXG" crossorigin="anonymous"></script>
</head>

<body>
    <!-- Global Loading Overlay -->
    <div id="global-loader">
        <div class="loader-logo">DealChat</div>
        <div class="loader-text">데이터를 불러오는 중입니다...</div>
    </div>

    <div class="app-container">

        <main class="main-content dashboard-bg">
            <header id="global-header" class="top-bar"></header>

            <section class="page-content"
                style="flex: 1; display: flex; flex-direction: column; padding: 20px 40px 40px; max-width: 1400px; margin: 0 auto; width: 100%;">

                <div class="text-center mb-4">
                    <h1
                        style="font-size: 48px; font-weight: 700; color: var(--text-main); margin-bottom: 8px; font-family: 'Outfit', sans-serif;">
                        Companies Files</h1>
                    <p style="font-size: 20px; color: var(--text-secondary);">기업 정보 관련 문서 관리</p>
                </div>

                <div class="search-and-actions"
                    style="margin-bottom: 32px; position: relative; display: flex; align-items: center; justify-content: flex-end; min-height: 60px;">

                    <!-- Centered Search Bar -->
                    <div class="search-centered-wrap"
                        style="position: absolute; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; width: 100%; max-width: 800px; align-items: center; z-index: 1;">
                        <div class="input-wrapper"
                            style="flex: 1; padding: 12px 24px; border-radius: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); background: #ffffff; display: flex; align-items: center; border: 1px solid #e2e8f0; min-width: 0;">
                            <span class="material-symbols-outlined"
                                style="color: #64748b; font-size: 22px;">search</span>
                            <input type="text" id="search-input" placeholder="파일명 검색..."
                                style="flex: 1; border: none; outline: none; background: transparent; padding-left: 12px; font-size: 16px; color: #1e293b; min-width: 0;">
                        </div>
                        <button id="search-btn" class="btn-primary"
                            style="padding: 10px 32px; border-radius: 30px; background-color: #1A73E8; border: none; font-size: 16px; font-weight: 600; display: flex; align-items: center; justify-content: center; white-space: nowrap; box-shadow: 0 4px 12px rgba(26, 115, 232, 0.2);">
                            검색
                        </button>
                    </div>

                    <!-- Actions Right -->
                    <div class="actions-right"
                        style="display: flex; gap: 12px; align-items: center; flex-shrink: 0; position: relative; z-index: 2;">
                        <!-- Selection Download Icon Button -->
                        <button id="batch-download-btn" class="btn-icon-round" title="선택 파일 다운로드 (ZIP)"
                            style="width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background-color: #ffffff; border: 1px solid #e2e8f0; color: #64748b; transition: all 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">
                            <span class="material-symbols-outlined" style="font-size: 22px;">download</span>
                        </button>
                        <!-- Selection Delete Icon Button -->
                        <button id="batch-delete-btn" class="btn-icon-round" title="선택 파일 삭제"
                            style="width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background-color: #ffffff; border: 1px solid #e2e8f0; color: #64748b; transition: all 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">
                            <span class="material-symbols-outlined" style="font-size: 22px;">delete</span>
                        </button>
                    </div>
                </div>

                <div id="fileGrid" class="ag-theme-alpine" style="flex: 1; width: 100%;"></div>
            </section>
        </main>
    </div>

    <!-- Bootstrap Modal -->
    <div class="modal fade" id="file-modal" tabindex="-1" aria-labelledby="fileModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-bottom-0 pt-4 px-4">
                    <h5 class="modal-title fw-bold" id="fileModalLabel">파일 상세</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body px-4 pb-4">
                    <form id="file-detail-form" class="container-fluid">
                        <!-- ID -->
                        <div class="row mb-4 align-items-center">
                            <label class="col-sm-2 col-form-label fw-bold text-muted">ID</label>
                            <div class="col-sm-10">
                                <input type="text" id="modal-id" class="form-control border-0 px-3 py-2" readonly
                                    style="font-family: monospace; cursor: not-allowed; background-color: #f8fafc; color: #64748b;">
                            </div>
                        </div>
                        <!-- 파일 이름 -->
                        <div class="row mb-4 align-items-center">
                            <label class="col-sm-2 col-form-label fw-bold">파일 이름
                            </label>
                            <div class="col-sm-10">
                                <div style="position: relative; display: flex; align-items: center;">
                                    <input type="text" id="modal-file-name-input"
                                        class="form-control border-0 px-3 py-2" readonly
                                        style="font-family: monospace; cursor: not-allowed; padding-right: 40px !important; width: 100%; background-color: #f8fafc; color: #1e293b;">
                                    <a href="#" id="modal-location-icon" target="_blank"
                                        style="position: absolute; right: 12px; color: var(--text-secondary); height: 18px; line-height: 1;">
                                        <span class="material-symbols-outlined" style="font-size: 18px;">download</span>
                                    </a>
                                </div>
                            </div>
                        </div>
                        <!-- 요약 -->
                        <div class="row mb-4">
                            <label class="col-sm-2 col-form-label fw-bold pt-2">요약</label>
                            <div class="col-sm-10">
                                <div style="position: relative;">
                                    <textarea id="modal-summary"
                                        class="form-control border-secondary-subtle px-3 py-2 shadow-sm" rows="8"
                                        style="padding-right: 45px !important;"></textarea>
                                    <button type="button" id="AI-generate-summary"
                                        class="btn btn-link p-0 text-primary d-flex align-items-center" title="AI 요약 생성"
                                        style="text-decoration: none; position: absolute; top: 10px; right: 12px; z-index: 5;">
                                        <span class="material-symbols-outlined"
                                            style="font-size: 20px;">auto_awesome</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <!-- 태그 -->
                        <div class="row mb-4 align-items-center">
                            <label class="col-sm-2 col-form-label fw-bold">태그</label>
                            <div class="col-sm-10">
                                <div style="position: relative; display: flex; align-items: center;">
                                    <input type="text" id="modal-tags"
                                        class="form-control border-secondary-subtle px-3 py-2 shadow-sm"
                                        placeholder="쉼표로 구분" style="padding-right: 40px !important; width: 100%;">
                                    <button type="button" id="AI-generate-tags"
                                        class="btn btn-link p-0 text-primary d-flex align-items-center" title="AI 태그 생성"
                                        style="text-decoration: none; position: absolute; right: 12px; z-index: 5;">
                                        <span class="material-symbols-outlined"
                                            style="font-size: 20px;">auto_awesome</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <!-- 코멘츠 -->
                        <div class="row mb-4">
                            <label class="col-sm-2 col-form-label fw-bold pt-2">코멘트</label>
                            <div class="col-sm-10">
                                <textarea id="modal-comments"
                                    class="form-control border-secondary-subtle px-3 py-2 shadow-sm"
                                    rows="3"></textarea>
                            </div>
                        </div>
                        <!-- 파일위치 -->
                        <div class="row mb-4 align-items-center">
                            <label class="col-sm-2 col-form-label fw-bold">다운로드</label>
                            <div class="col-sm-10">
                                <a id="modal-location-btn"
                                    class="btn btn-primary px-4 py-2 rounded-pill shadow-sm d-flex align-items-center gap-2"
                                    style="width: fit-content;" target="_blank">
                                    <span class="material-symbols-outlined" style="font-size: 18px;">download</span>
                                    <span>Download</span>
                                </a>
                            </div>
                        </div>
                        <!-- Timestamps -->
                        <div class="row mb-4 align-items-center">
                            <label class="col-sm-2 col-form-label fw-bold text-muted small">등록일</label>
                            <div class="col-sm-10">
                                <input type="text" id="modal-createdAt"
                                    class="form-control-plaintext border-0 px-3 py-2 rounded small" readonly
                                    style="background-color: #f8fafc; color: #64748b;">
                            </div>
                        </div>
                        <div class="row mb-4 align-items-center">
                            <label class="col-sm-2 col-form-label fw-bold text-muted small">수정일</label>
                            <div class="col-sm-10">
                                <input type="text" id="modal-updatedAt"
                                    class="form-control-plaintext border-0 px-3 py-2 rounded small" readonly
                                    style="background-color: #f8fafc; color: #64748b;">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-top-0 px-4 pb-4">
                    <button type="button" id="delete-file-btn"
                        class="btn btn-danger px-4 py-2 rounded-pill fw-semibold shadow me-2">삭제</button>
                    <button type="button" id="save-file-btn"
                        class="btn btn-primary px-5 py-2 rounded-pill fw-semibold shadow">저장</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../js/header_loader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="../js/front-config.js"></script>
    <script src="../js/files.js" type="module"></script>

    <style>
        @import url('https://cdn.jsdelivr.net/npm/ag-grid-community@35.2.1/styles/ag-grid.css');
        @import url('https://cdn.jsdelivr.net/npm/ag-grid-community@35.2.1/styles/ag-theme-alpine.css');

        .ag-theme-alpine {
            --ag-border-color: var(--border-color);
            --ag-header-background-color: #1A73E8;
            --ag-odd-row-background-color: #ffffff;
            --ag-header-foreground-color: #ffffff;
            --ag-foreground-color: #1e293b;
            --ag-background-color: #ffffff;
            border-radius: 0;
            overflow: hidden;
        }

        .ag-theme-alpine .ag-cell-value {
            text-align: left !important;
            justify-content: flex-start !important;
        }

        .ag-theme-alpine .ag-header-cell-label {
            justify-content: flex-start !important;
        }

        .ag-row {
            cursor: default;
        }

        .btn-primary {
            background-color: var(--primary-color) !important;
            border-color: var(--primary-color) !important;
        }

        /* Modal font size adjustment */
        #file-modal .col-form-label {
            font-size: 0.85rem;
        }

        #file-modal .form-control,
        #file-modal .form-control-plaintext {
            font-size: 0.85rem;
        }
    </style>
</body>

</html>
