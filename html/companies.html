<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Companies - DealChat</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <!-- AG Grid -->
    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/ag-grid-community.min.js"></script>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="material-symbols-outlined logo-icon">auto_awesome</span>
                    <span class="logo-text">DealChat</span>
                </div>
                <button class="btn-new-source" onclick="location.href='dealbook.html'">
                    <span class="material-symbols-outlined">chat</span>
                    채팅으로 돌아가기
                </button>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <ul class="source-list">
                        <li class="source-item" onclick="location.href='files.html'">
                            <span class="material-symbols-outlined">description</span>
                            <span class="source-name">내 파일</span>
                        </li>
                        <li class="source-item active" onclick="location.href='companies.html'">
                            <span class="material-symbols-outlined">business</span>
                            <span class="source-name">기업 목록</span>
                        </li>
                    </ul>
                </div>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="breadcrumb">
                    <span class="folder">DealChat</span>
                    <span class="separator">/</span>
                    <span class="notebook-title">기업 데이터베이스</span>
                </div>
            </header>

            <section class="grid-container" style="padding: 24px; flex: 1;">
                <div id="companyGrid" class="ag-theme-alpine" style="height: 100%; width: 100%;"></div>
            </section>
        </main>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        const columnDefs = [
            { field: "company", headerName: "기업명", sortable: true, filter: true, flex: 2 },
            { field: "industry", headerName: "산업분야", sortable: true, filter: true, flex: 1.5 },
            { field: "stage", headerName: "투자단계", sortable: true, filter: true, flex: 1 },
            { field: "valuation", headerName: "기업가치", sortable: true, flex: 1.5 },
            { field: "location", headerName: "본사소재지", sortable: true, flex: 1.5 }
        ];

        const rowData = [
            { company: "와이앤아처", industry: "엑셀러레이터", stage: "Late Stage", valuation: "500억", location: "서울특별시" },
            { company: "테크스타즈", industry: "AI 솔루션", stage: "Series A", valuation: "120억", location: "경기도 성남시" },
            { company: "에코모빌리티", industry: "모빌리티", stage: "Seed", valuation: "30억", location: "대구광역시" },
            { company: "바이오넥스트", industry: "헬스케어", stage: "Series B", valuation: "450억", location: "충청북도 오송" },
            { company: "핀테크랩", industry: "금융기술", stage: "Pre-A", valuation: "80억", location: "서울특별시" }
        ];

        const gridOptions = {
            columnDefs: columnDefs,
            rowData: rowData,
            defaultColDef: {
                resizable: true,
                filter: true
            },
            pagination: true,
            paginationPageSize: 10
        };

        $(document).ready(function () {
            const gridDiv = document.querySelector('#companyGrid');
            new agGrid.Grid(gridDiv, gridOptions);
        });
    </script>
    <style>
        @import url('https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-grid.css');
        @import url('https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-theme-alpine.css');

        .ag-theme-alpine {
            --ag-border-color: var(--border-color);
            --ag-header-background-color: #f1f3f4;
            --ag-odd-row-background-color: #fafafa;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: var(--shadow-md);
        }
    </style>
</body>

</html>
