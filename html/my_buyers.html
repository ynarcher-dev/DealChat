<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Buyers - DealChat</title>
    <!-- Bootstrap CSS - Moved up to let style.css override it -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Pretendard Font -->
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="../js/profile_modal.js" type="module"></script>
    <style>
        /* Buyer-page checkbox: status filter (not in style.css base selector list) */
        .status-checkbox:checked + .industry-checkbox-label {
            background-color: var(--page-theme-color);
            border-color: var(--page-theme-color);
            color: #ffffff;
            box-shadow: 0 4px 10px var(--page-theme-shadow);
        }
    </style>
</head>

<body class="theme-mode-buyers" data-share-entity="매수자 정보">
    <!-- Global Loading Overlay -->
    <div id="global-loader">
        <div class="loader-logo">DealChat</div>
        <div class="loader-text"></div>
    </div>

    <!-- Transition Loader for Detail View -->
    <div id="transition-loader">
        <div class="spinner"></div>
        <div class="loader-text"></div>
    </div>

    <div class="app-container">

        <main class="main-content dashboard-bg">
            <header id="global-header" class="top-bar"></header>

            <section class="page-content">

                <div class="text-center mb-4">
                    <h1 class="page-title">My Buyers</h1>
                    <p class="page-subtitle">내가 담당하는 매수자 정보를 관리하세요.</p>
                </div>

                <div class="search-and-actions">

                    <!-- Centered Search Bar -->
                    <div class="search-centered-wrap">
                        <div class="input-wrapper">
                            <input type="text" id="search-input" placeholder="매수자명, ID 또는 키워드로 검색해주세요">
                            <button id="search-icon-btn">
                                <span class="material-symbols-outlined">search</span>
                            </button>
                        </div>
                    </div>

                    <!-- Right: Action Icons -->
                    <div class="actions-right">

                        <!-- CSV Download Icon Button -->
                        <button id="export-csv-btn" class="btn-icon-round" title="CSV 다운로드">
                            <span class="material-symbols-outlined">download</span>
                        </button>
                        <!-- Add Buyer Icon Button -->
                        <button id="new-btn" class="btn-icon-round primary" title="매수자 등록">
                            <span class="material-symbols-outlined">add</span>
                        </button>
                    </div>
                </div>

                <!-- Collapsible Filter Container -->
                <div id="filter-container" class="filter-panel">
                    <!-- Industry Filter -->
                    <div class="filter-group mb-4">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <label class="filter-group-label">산업분야</label>
                            <button id="reset-filters" class="btn-filter-reset">선택 해제</button>
                        </div>
                        <div id="filter-industry-list" class="d-flex flex-wrap gap-2">
                            <!-- Industry checkboxes will be injected here -->
                        </div>
                    </div>

                    <!-- Row for Status and Visibility -->
                    <div class="row">
                        <!-- Status Filter -->
                        <div class="col-md-4">
                            <div class="filter-group mb-4">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <label class="filter-group-label">진행 현황</label>
                                </div>
                                <div id="filter-status-list" class="d-flex flex-wrap gap-2">
                                    <div class="filter-item">
                                        <input type="checkbox" class="btn-check status-checkbox" id="filter-status-대기"
                                            value="대기" autocomplete="off">
                                        <label class="industry-checkbox-label" for="filter-status-대기">대기</label>
                                    </div>
                                    <div class="filter-item">
                                        <input type="checkbox" class="btn-check status-checkbox" id="filter-status-진행중"
                                            value="진행중" autocomplete="off">
                                        <label class="industry-checkbox-label" for="filter-status-진행중">진행중</label>
                                    </div>
                                    <div class="filter-item">
                                        <input type="checkbox" class="btn-check status-checkbox" id="filter-status-완료"
                                            value="완료" autocomplete="off">
                                        <label class="industry-checkbox-label" for="filter-status-완료">완료</label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Visibility Filter -->
                        <div class="col-md-4">
                            <div class="filter-group mb-4">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <label class="filter-group-label">공개 여부</label>
                                </div>
                                <div id="filter-visibility-list" class="d-flex flex-wrap gap-2">
                                    <div class="filter-item">
                                        <input type="checkbox" class="btn-check visibility-checkbox"
                                            id="filter-vis-public" value="public" autocomplete="off">
                                        <label class="industry-checkbox-label" for="filter-vis-public">공개</label>
                                    </div>
                                    <div class="filter-item">
                                        <input type="checkbox" class="btn-check visibility-checkbox"
                                            id="filter-vis-private" value="private" autocomplete="off">
                                        <label class="industry-checkbox-label" for="filter-vis-private">비공개</label>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Price Range Filter (UI Only) -->
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="filter-range-label">가용자금 범위 (원)</label>
                            <div class="d-flex align-items-center gap-2">
                                <input type="number" id="filter-min-price" class="form-control filter-range-input" placeholder="최소">
                                <span class="text-muted">~</span>
                                <input type="number" id="filter-max-price" class="form-control filter-range-input" placeholder="최대">
                            </div>
                        </div>
                    </div>

                </div>

                <!-- Table Header Section: Title & Sort -->
                <div class="d-flex justify-content-between align-items-end mb-3 px-1">
                    <div class="list-section-title">
                        매수자 목록
                    </div>
                    <div class="dropdown">
                        <button
                            class="btn btn-outline-secondary dropdown-toggle d-flex align-items-center justify-content-between p-2 sort-dropdown-btn"
                            type="button" id="sort-dropdown-btn" data-bs-toggle="dropdown" aria-expanded="false">
                            <div class="d-flex align-items-center gap-2">
                                <span class="material-symbols-outlined">sort</span>
                                <span id="current-sort-label">최근 등록순</span>
                            </div>
                            <span class="material-symbols-outlined">expand_more</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end border-0 shadow-lg p-2 mt-2"
                            aria-labelledby="sort-dropdown-btn">
                            <li><a class="dropdown-item rounded-3 py-2 sort-option active" href="#" data-sort="latest">최근 등록순</a></li>
                            <li><a class="dropdown-item rounded-3 py-2 sort-option" href="#" data-sort="oldest">오래된 등록순</a></li>
                            <li class="dropdown-divider my-1"></li>
                            <li><a class="dropdown-item rounded-3 py-2 sort-option" href="#" data-sort="name_asc">이름순 (ㄱ-ㅎ)</a></li>
                            <li><a class="dropdown-item rounded-3 py-2 sort-option" href="#" data-sort="name_desc">이름순 (ㅎ-ㄱ)</a></li>
                            <li class="dropdown-divider my-1"></li>
                            <li><a class="dropdown-item rounded-3 py-2 sort-option" href="#" data-sort="price_desc">가용자금 높은순</a></li>
                            <li><a class="dropdown-item rounded-3 py-2 sort-option" href="#" data-sort="price_asc">가용자금 낮은순</a></li>
                        </ul>
                    </div>
                </div>

                <!-- Buyers Table Container -->
                <div id="buyer-list-wrap" class="list-table-wrap">
                    <div class="table-responsive">
                        <table class="table table-hover m-0" style="table-layout: fixed; vertical-align: middle;">
                            <thead>
                                <tr>
                                    <th class="list-th" style="width: 240px;">매수자명</th>
                                    <th class="list-th" style="width: 140px;">산업</th>
                                    <th class="list-th" style="width: 90px;">가용자금</th>
                                    <th class="list-th" style="width: 100px;">진행 현황</th>
                                    <th class="list-th" style="width: 300px;">비공개 메모 (작성자만 확인 가능)</th>
                                    <th class="list-th" style="width: 110px;">담당자</th>
                                    <th class="list-th" style="width: 110px;">등록일</th>
                                    <th class="list-th" style="width: 70px;">공유</th>
                                </tr>
                            </thead>
                            <tbody id="buyer-list-container">
                                <!-- Table rows will be injected here -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Pagination -->
                <div id="pagination-container" class="d-flex justify-content-center mt-5" style="gap: 8px;">
                    <!-- Pagination buttons will be injected here -->
                </div>
            </section>
            <footer id="global-footer"></footer>
        </main>
    </div>





    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/front-config.js"></script>
    <script src="../js/header_loader.js"></script>
    <script src="../js/footer_loader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/modal_loader.js"></script>
    <script src="../js/my_buyers.js?v=20260311_01" type="module"></script>
</body>
</html>
