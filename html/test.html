<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lambda API Tester - DealChat</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image:
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(236, 72, 153, 0.1) 0, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        input[type="text"],
        textarea {
            width: 100%;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        textarea {
            min-height: 150px;
            resize: vertical;
        }

        .actions {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }

        button {
            flex: 1;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px 24px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .result-container {
            margin-top: 40px;
            padding-top: 32px;
            border-top: 1px solid var(--border);
            display: none;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .status-error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
        }

        pre {
            background: #000;
            padding: 20px;
            border-radius: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            overflow-x: auto;
            white-space: pre-wrap;
            border: 1px solid var(--border);
        }

        .spin {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .material-symbols-outlined {
            font-size: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>
            <span class="material-symbols-outlined" style="font-size: 32px;">bolt</span>
            API Tester
        </h1>
        <p class="subtitle">Lambda Function & OpenAI Integration Test</p>

        <div class="form-group">
            <label for="lambda-url">Lambda URL</label>
            <input type="text" id="lambda-url"
                value="https://iocc4lp5btcyfcrgmyux4s3mea0lnbko.lambda-url.ap-northeast-2.on.aws/"
                placeholder="https://...">
        </div>

        <div class="form-group">
            <label for="prompt-input">Test Prompt</label>
            <textarea id="prompt-input"
                placeholder="Enter your question here... e.g., 'What is corporate analysis?'"></textarea>
        </div>

        <div class="actions">
            <button id="test-btn">
                <span class="material-symbols-outlined">send</span>
                Send Request
            </button>
            <button id="clear-btn"
                style="background: rgba(255,255,255,0.05); color: var(--text-muted); flex: 0 0 auto;">
                <span class="material-symbols-outlined">delete</span>
            </button>
        </div>

        <div id="result-area" class="result-container">
            <div class="result-header">
                <label>Response</label>
                <div id="status-badge" class="status-badge status-success">Success</div>
            </div>
            <pre id="response-output"></pre>
        </div>
    </div>

    <script>
        const testBtn = document.getElementById('test-btn');
        const clearBtn = document.getElementById('clear-btn');
        const lambdaUrlInput = document.getElementById('lambda-url');
        const promptInput = document.getElementById('prompt-input');
        const resultArea = document.getElementById('result-area');
        const responseOutput = document.getElementById('response-output');
        const statusBadge = document.getElementById('status-badge');

        async function runTest() {
            const url = lambdaUrlInput.value.trim();
            const prompt = promptInput.value.trim();

            if (!url || !prompt) {
                alert('Please enter both Lambda URL and Prompt');
                return;
            }

            // UI Update
            testBtn.disabled = true;
            testBtn.innerHTML = '<span class="material-symbols-outlined spin">sync</span> Sending...';
            resultArea.style.display = 'block';
            responseOutput.textContent = 'Waiting for response...';
            responseOutput.style.color = 'var(--text-muted)';

            try {
                const startTime = performance.now();
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ body: prompt })
                });

                const endTime = performance.now();
                const duration = ((endTime - startTime) / 1000).toFixed(2);

                if (!response.ok) {
                    throw new Error(`HTTP Error ${response.status}: ${await response.text()}`);
                }

                const data = await response.json();

                statusBadge.textContent = `Success (${duration}s)`;
                statusBadge.className = 'status-badge status-success';

                // If it's the expected structure, show the answer clearly
                if (data.answer) {
                    responseOutput.textContent = data.answer;
                    responseOutput.style.color = '#fff';
                    console.log('Full JSON Response:', data);
                } else {
                    responseOutput.textContent = JSON.stringify(data, null, 2);
                }

            } catch (error) {
                console.error('Test Error:', error);
                statusBadge.textContent = 'Error';
                statusBadge.className = 'status-badge status-error';
                responseOutput.textContent = error.message;
                responseOutput.style.color = 'var(--error)';
            } finally {
                testBtn.disabled = false;
                testBtn.innerHTML = '<span class="material-symbols-outlined">send</span> Send Request';
            }
        }

        testBtn.addEventListener('click', runTest);

        clearBtn.addEventListener('click', () => {
            promptInput.value = '';
            resultArea.style.display = 'none';
        });

        // Allow Enter to send (Cmd+Enter or Ctrl+Enter for textarea)
        promptInput.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                runTest();
            }
        });
    </script>
</body>

</html>
