<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - DealChat</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" integrity="sha384-uGEvnSEpW2nM9xJFsrxrwakwrk9QdDTQIBJh0hVMu90OaVyMAMpAK1rIn0/Kh1/k" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="icon" type="image/png" href="../img/dealchat-favicon.png">
</head>

<body>
    <!-- Global Loading Overlay -->
    <div id="global-loader">
        <div class="loader-logo">DealChat</div>
        <div class="loader-text"></div>
    </div>
    <div class="app-container">
        <main class="main-content dashboard-bg">
            <header id="global-header" class="top-bar"></header>

            <section class="dashboard-content">

                <div class="welcome-header">
                    <h1>반갑습니다, <span id="userName2">홍길동</span>님</h1>
                    <p>M&A 딜과 기업 정보를 탐색하고, 직접 담당하는 데이터를 관리하세요.</p>
                </div>

                <div class="card-grid">
                    <!-- Column 1: 기업정보 관련 -->
                    <div class="menu-card primary-card group-startup" onclick="location.href='./total_companies.html'">
                        <div class="card-icon-wrapper startup-db">
                            <span class="material-symbols-outlined">database</span>
                        </div>
                        <div class="card-content-wrap">
                            <div class="text-block">
                                <h3>Companies <span class="count-badge" id="count-total-companies">-</span></h3>
                                <p>유망 기업 정보 및 데이터베이스 관리</p>
                            </div>
                        </div>
                    </div>

                    <!-- Column 2: 매도자 정보 관련 -->
                    <div class="menu-card primary-card group-ma-seller" onclick="location.href='./total_sellers.html'">
                        <div class="card-icon-wrapper seller-icon">
                            <span class="material-symbols-outlined">storefront</span>
                        </div>
                        <div class="card-content-wrap">
                            <div class="text-block">
                                <h3>M&A Sellers <span class="count-badge" id="count-total-sellers">-</span></h3>
                                <p>매도자 통합 정보 및 관리</p>
                            </div>
                        </div>
                    </div>

                    <!-- Column 3: 매수자 정보 관련 -->
                    <div class="menu-card primary-card group-ma-buyer" onclick="location.href='./total_buyers.html'">
                        <div class="card-icon-wrapper buyer-icon">
                            <span class="material-symbols-outlined">groups</span>
                        </div>
                        <div class="card-content-wrap">
                            <div class="text-block">
                                <h3>M&A Buyers <span class="count-badge" id="count-total-buyers">-</span></h3>
                                <p>매수자 통합 정보 및 관리</p>
                            </div>
                        </div>
                    </div>

                    <!-- Row 2: Sub-menus -->
                    <div class="menu-card card-companies" onclick="location.href='./my_companies.html'">
                        <h3>My Companies</h3>
                        <p>내 기업 정보 관리</p>
                        <div class="my-count-info">
                            <span class="count-tag public">공개 <span id="count-my-companies-public">0</span></span>
                            <span class="count-tag private">비공개 <span id="count-my-companies-private">0</span></span>
                        </div>
                    </div>

                    <div class="menu-card card-sellers" onclick="location.href='./my_sellers.html'">
                        <h3>My Sellers</h3>
                        <p>내 매도자 정보 관리</p>
                        <div class="my-count-info">
                            <span class="count-tag public">공개 <span id="count-my-sellers-public">0</span></span>
                            <span class="count-tag private">비공개 <span id="count-my-sellers-private">0</span></span>
                        </div>
                    </div>

                    <div class="menu-card card-buyers" onclick="location.href='./my_buyers.html'">
                        <h3>My Buyers</h3>
                        <p>내 매수자 정보 관리</p>
                        <div class="my-count-info">
                            <span class="count-tag public">공개 <span id="count-my-buyers-public">0</span></span>
                            <span class="count-tag private">비공개 <span id="count-my-buyers-private">0</span></span>
                        </div>
                    </div>

                </div>
            </section>

            <footer id="global-footer"></footer>
        </main>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.103.0" integrity="sha384-PsnFqJ58vyp7buRfuvdS2SrjRdUYinBv6lWwJXx3xQ17hWefo/UkwXowVBT53ubG" crossorigin="anonymous"></script>
    <script src="../js/front-config.js"></script>
    <script src="../js/header_loader.js"></script>
    <script src="../js/footer_loader.js"></script>
    <script src="../js/dashboard.js" type="module"></script>


</body>

</html>
