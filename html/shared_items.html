<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공유 목록 - DealChat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/url_helper.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" integrity="sha384-uGEvnSEpW2nM9xJFsrxrwakwrk9QdDTQIBJh0hVMu90OaVyMAMpAK1rIn0/Kh1/k" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body>
    <!-- Global Loading Overlay -->
    <div id="global-loader">
        <div class="loader-logo">DealChat</div>
        <div class="loader-text">데이터를 불러오는 중입니다...</div>
    </div>

    <div class="app-container">
        <main class="main-content dashboard-bg">
            <header id="global-header" class="top-bar"></header>

            <section class="page-content">
                <!-- 페이지 헤더 -->
                <div class="text-center mb-4">
                    <h1 id="page-main-title" class="page-title">공유 목록</h1>
                    <p class="page-subtitle">동료들이 공유한 기업·매수자·매도자 정보를 확인하세요.</p>
                </div>

                <!-- 검색바 -->
                <div class="search-and-actions">
                    <div class="search-centered-wrap">
                        <div class="input-wrapper">
                            <input type="text" id="search-input" placeholder="이름, 메모, 산업 키워드로 검색해주세요">
                            <button id="search-btn">
                                <span class="material-symbols-outlined">search</span>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 테이블 헤더: 타이틀 & 필터 & 정렬 -->
                <div class="d-flex justify-content-between align-items-center mb-3 px-1">
                    <div class="list-section-title">공유 목록</div>
                    <div class="d-flex align-items-center gap-2">
                        <!-- 읽기 여부 토글 -->
                        <button id="filter-tab-unread" class="unread-toggle-btn">
                            <span class="material-symbols-outlined">notifications_paused</span>
                            읽지 않음
                        </button>
                        <!-- 정렬 드롭다운 -->
                        <div class="dropdown">
                            <button
                                class="btn btn-outline-secondary dropdown-toggle d-flex align-items-center justify-content-between p-2 sort-dropdown-btn"
                                type="button" id="sort-dropdown-btn" data-bs-toggle="dropdown" aria-expanded="false">
                                <div class="d-flex align-items-center gap-2">
                                    <span class="material-symbols-outlined">sort</span>
                                    <span id="current-sort-label">최근 등록순</span>
                                </div>
                                <span class="material-symbols-outlined">expand_more</span>
                            </button>
                            <ul class="dropdown-menu dropdown-menu-end border-0 shadow-lg p-2 mt-2"
                                aria-labelledby="sort-dropdown-btn"
                                style="border-radius: 12px; font-size: 13px; min-width: 160px;">
                                <li><a class="dropdown-item rounded-3 py-2 sort-option active" href="#" data-sort="newest">최근 등록순</a></li>
                                <li><a class="dropdown-item rounded-3 py-2 sort-option" href="#" data-sort="oldest">오래된 등록순</a></li>
                            </ul>
                        </div>
                    </div>
                </div>

                <!-- 리스트 컨테이너 -->
                <div id="list-container" class="list-table-wrap">
                    <div class="table-responsive">
                        <table class="table table-hover m-0" style="vertical-align: middle; width: 100%;">
                            <colgroup>
                                <col style="width: 170px;">  <!-- 기업명 -->
                                <col style="width: 150px;">  <!-- 산업 -->
                                <col style="width: 70px;">   <!-- 구분 -->
                                <col style="width: 70px;">   <!-- 공개여부 -->
                                <col style="width: 160px;">  <!-- 메모 및 내용 -->
                                <col style="width: 160px;">  <!-- 발신자 -->
                                <col style="width: 120px;">  <!-- 공유일 -->
                                <col style="width: 120px;">  <!-- 수신 확인 -->
                                <col style="width: 60px;">   <!-- 삭제 -->
                            </colgroup>
                            <thead>
                                <tr>
                                    <th class="list-th">기업명</th>
                                    <th class="list-th">산업</th>
                                    <th class="list-th">구분</th>
                                    <th class="list-th">공개여부</th>
                                    <th class="list-th">메모 및 내용</th>
                                    <th class="list-th">발신자</th>
                                    <th class="list-th list-th-c">공유일</th>
                                    <th class="list-th list-th-c">수신 확인</th>
                                    <th class="list-th" style="text-align: center;">삭제</th>
                                </tr>
                            </thead>
                            <tbody id="shared-items-list">
                                <!-- JS에서 데이터 주입 -->
                            </tbody>
                        </table>
                    </div>

                    <!-- 빈 상태 -->
                    <div id="empty-state" class="dc-empty-state">
                        <div class="dc-empty-icon">
                            <span class="material-symbols-outlined">folder_open</span>
                        </div>
                        <h3 id="empty-title" style="font-size: 18px; font-weight: 700; color: var(--text-main); margin-bottom: 6px;">항목이 없습니다</h3>
                        <p id="empty-desc" style="color: #94a3b8; font-size: 14px; margin: 0;">조건에 맞는 공유 내역이 없습니다.</p>
                    </div>
                </div>

                <!-- 페이지네이션 -->
                <div id="pagination-container" class="d-flex justify-content-center mt-5" style="gap: 8px;"></div>
            </section>

            <footer id="global-footer"></footer>
        </main>
    </div>

    <!-- ───────────────────────────────────────────
         공유 항목 요약 모달
    ─────────────────────────────────────────── -->
    <div id="item-summary-modal" class="summary-modal-backdrop">
        <div class="summary-modal-dialog">

            <!-- 헤더 -->
            <div class="summary-modal-header">
                <div id="summary-header-icon" class="summary-header-icon">
                    <span id="summary-header-icon-symbol" class="material-symbols-outlined">folder_shared</span>
                </div>
                <div id="summary-item-name" class="summary-header-name"></div>
                <div class="summary-header-badges">
                    <span id="summary-type-badge" class="summary-badge-pill"></span>
                    <span id="summary-visibility-badge" class="summary-badge-pill"></span>
                </div>
            </div>

            <!-- 바디 -->
            <div class="summary-modal-body">

                <!-- 메모 -->
                <div class="summary-section">
                    <div class="summary-label">메모</div>
                    <div id="summary-memo" class="summary-content-box"></div>
                </div>

                <!-- 첨부 파일 -->
                <div id="summary-files-area" class="summary-section">
                    <div class="summary-label">첨부 파일</div>
                    <div id="summary-nda-notice" style="display: none;">
                        <div class="nda-lock-notice">
                            <span class="material-symbols-outlined">lock</span>
                            파일을 열람하려면 상세 페이지에서 NDA 체결이 필요합니다.
                        </div>
                    </div>
                    <div id="summary-files-list" class="summary-files-box"></div>
                </div>

                <!-- 발신자 & 공유일 (카드 형태) -->
                <div class="summary-sender-card">
                    <img id="summary-sender-avatar" src="" alt="Avatar" class="summary-sender-avatar">
                    <div class="summary-sender-info">
                        <div id="summary-sender-name" class="sender-name"></div>
                        <div id="summary-sender-meta" class="sender-meta"></div>
                    </div>
                    <div class="shared-date">
                        <div class="date-label">공유일</div>
                        <div id="summary-date" class="date-value"></div>
                    </div>
                </div>
            </div>

            <!-- 하단 버튼 -->
            <div class="summary-modal-footer">
                <button id="btn-close-summary" type="button" class="btn-summary btn-summary-close" data-bs-dismiss="modal">
                    돌아가기
                </button>
                <button id="btn-go-detail" type="button" class="btn-summary btn-summary-action">
                    <span class="material-symbols-outlined" style="font-size: 18px;">open_in_new</span>
                    열람하기
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.103.0" integrity="sha384-PsnFqJ58vyp7buRfuvdS2SrjRdUYinBv6lWwJXx3xQ17hWefo/UkwXowVBT53ubG" crossorigin="anonymous"></script>
    <script src="../js/front-config.js"></script>
    <script src="../js/header_loader.js"></script>
    <script src="../js/footer_loader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="../js/shared_items.js?v=20260329_02" type="module"></script>
</body>

</html>
